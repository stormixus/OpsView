name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

env:
  GO_VERSION: "1.25"

jobs:
  build-agent:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: agent/go.sum

      - name: Build agent (windows/amd64)
        run: |
          cd agent
          GOOS=windows GOARCH=amd64 go build -ldflags="-s -w" -o opsview-agent.exe .

      - name: Package agent
        run: |
          mkdir -p dist/agent
          cp agent/opsview-agent.exe dist/agent/
          cp agent/scripts/*.bat dist/agent/
          cd dist && zip -r ../opsview-agent-windows-amd64.zip agent/

      - uses: actions/upload-artifact@v4
        with:
          name: opsview-agent-windows-amd64
          path: opsview-agent-windows-amd64.zip

  build-viewer:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            goos: windows
            goarch: amd64
            artifact: opsview-viewer-windows-amd64
            wails_flags: "-nsis"
          - os: ubuntu-22.04
            goos: linux
            goarch: amd64
            artifact: opsview-viewer-linux-amd64
            wails_flags: ""
          - os: macos-latest
            goos: darwin
            goarch: arm64
            artifact: opsview-viewer-darwin-arm64
            wails_flags: ""
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: viewer/go.sum

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Install NSIS
        if: matrix.goos == 'windows'
        shell: bash
        run: choco install nsis -y

      - name: Install Linux dependencies
        if: matrix.goos == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev

      - name: Build viewer
        run: |
          cd viewer
          wails build ${{ matrix.wails_flags }} -platform ${{ matrix.goos }}/${{ matrix.goarch }}

      - name: Import signing certificate
        if: matrix.goos == 'darwin' && env.HAS_CERT == 'true'
        env:
          HAS_CERT: ${{ secrets.APPLE_CERTIFICATE_P12_BASE64 != '' }}
        run: |
          echo "${{ secrets.APPLE_CERTIFICATE_P12_BASE64 }}" | base64 --decode > cert.p12
          KEYCHAIN=build.keychain-db
          security create-keychain -p actions $KEYCHAIN
          security set-keychain-settings -lut 900 $KEYCHAIN
          security unlock-keychain -p actions $KEYCHAIN
          security import cert.p12 -k $KEYCHAIN -P "${{ secrets.APPLE_CERTIFICATE_PASSWORD }}" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k actions $KEYCHAIN
          security list-keychains -d user -s $KEYCHAIN login.keychain
          rm cert.p12

      - name: Sign app
        if: matrix.goos == 'darwin' && env.HAS_CERT == 'true'
        env:
          HAS_CERT: ${{ secrets.APPLE_CERTIFICATE_P12_BASE64 != '' }}
        run: |
          codesign --deep --force --options runtime \
            --sign "${{ secrets.APPLE_SIGNING_IDENTITY }}" \
            --entitlements viewer/build/entitlements.plist \
            viewer/build/bin/opsview-viewer.app

      - name: Notarize app
        if: matrix.goos == 'darwin' && env.HAS_CERT == 'true'
        env:
          HAS_CERT: ${{ secrets.APPLE_CERTIFICATE_P12_BASE64 != '' }}
        run: |
          ditto -c -k --keepParent viewer/build/bin/opsview-viewer.app notarize.zip
          xcrun notarytool submit notarize.zip \
            --apple-id "${{ secrets.APPLE_ID }}" \
            --password "${{ secrets.APPLE_ID_PASSWORD }}" \
            --team-id "${{ secrets.APPLE_TEAM_ID }}" \
            --wait
          xcrun stapler staple viewer/build/bin/opsview-viewer.app
          rm notarize.zip

      - name: Package viewer (Windows)
        if: matrix.goos == 'windows'
        shell: bash
        run: |
          cp "viewer/build/bin/opsview-viewer-amd64-installer.exe" "${{ matrix.artifact }}-setup.exe"

      - name: Package viewer (macOS)
        if: matrix.goos == 'darwin'
        run: |
          hdiutil create -volname "OpsView Viewer" \
            -srcfolder viewer/build/bin/opsview-viewer.app \
            -ov -format UDZO \
            ${{ matrix.artifact }}.dmg

      - name: Package viewer (Linux)
        if: matrix.goos == 'linux'
        run: |
          cd viewer/build/bin
          tar czf ../../../${{ matrix.artifact }}.tar.gz opsview-viewer

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            ${{ matrix.artifact }}-setup.exe
            ${{ matrix.artifact }}.dmg
            ${{ matrix.artifact }}.tar.gz

      - name: Cleanup keychain
        if: matrix.goos == 'darwin' && always()
        run: security delete-keychain build.keychain-db 2>/dev/null || true

  build-relay-windows:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: relay/go.sum

      - name: Build relay (windows/amd64)
        run: |
          cd relay
          GOOS=windows GOARCH=amd64 go build -ldflags="-s -w -H windowsgui" -o opsview-relay.exe .

      - name: Package relay
        run: |
          mkdir -p dist/relay
          cp relay/opsview-relay.exe dist/relay/
          cd dist && zip -r ../opsview-relay-windows-amd64.zip relay/

      - uses: actions/upload-artifact@v4
        with:
          name: opsview-relay-windows-amd64
          path: opsview-relay-windows-amd64.zip

  build-relay-docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract tag
        id: tag
        run: echo "version=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - name: Build and push relay image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: relay/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/opsview-relay:${{ steps.tag.outputs.version }}
            ghcr.io/${{ github.repository_owner }}/opsview-relay:latest

  release:
    needs: [build-agent, build-viewer, build-relay-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: opsview-*
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/*.dmg
            artifacts/*-setup.exe
            artifacts/*.tar.gz
            artifacts/*.zip
