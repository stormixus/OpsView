name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

env:
  GO_VERSION: "1.25"

jobs:
  build-agent:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Build agent (windows/amd64)
        run: |
          cd agent
          GOOS=windows GOARCH=amd64 go build -ldflags="-s -w" -o opsview-agent.exe .

      - name: Package agent
        run: |
          mkdir -p dist/agent
          cp agent/opsview-agent.exe dist/agent/
          cp agent/scripts/*.bat dist/agent/
          cd dist && zip -r ../opsview-agent-windows-amd64.zip agent/

      - uses: actions/upload-artifact@v4
        with:
          name: opsview-agent-windows-amd64
          path: opsview-agent-windows-amd64.zip

  build-viewer:
    strategy:
      matrix:
        include:
          - os: windows-latest
            goos: windows
            goarch: amd64
            artifact: opsview-viewer-windows-amd64
            ext: .exe
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
            artifact: opsview-viewer-linux-amd64
            ext: ""
          - os: macos-latest
            goos: darwin
            goarch: amd64
            artifact: opsview-viewer-darwin-amd64
            ext: .app
          - os: macos-latest
            goos: darwin
            goarch: arm64
            artifact: opsview-viewer-darwin-arm64
            ext: .app
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Install Linux dependencies
        if: matrix.goos == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev

      - name: Build viewer
        run: |
          cd viewer
          wails build -platform ${{ matrix.goos }}/${{ matrix.goarch }}

      - name: Package viewer (Windows)
        if: matrix.goos == 'windows'
        run: |
          cd viewer/build/bin
          7z a -tzip ../../../${{ matrix.artifact }}.zip opsview-viewer${{ matrix.ext }}

      - name: Package viewer (macOS)
        if: matrix.goos == 'darwin'
        run: |
          cd viewer/build/bin
          zip -r ../../../${{ matrix.artifact }}.zip opsview-viewer${{ matrix.ext }}

      - name: Package viewer (Linux)
        if: matrix.goos == 'linux'
        run: |
          cd viewer/build/bin
          tar czf ../../../${{ matrix.artifact }}.tar.gz opsview-viewer

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            ${{ matrix.artifact }}.zip
            ${{ matrix.artifact }}.tar.gz

  build-relay-windows:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Build relay (windows/amd64)
        run: |
          cd relay
          GOOS=windows GOARCH=amd64 go build -ldflags="-s -w -H windowsgui" -o opsview-relay.exe .

      - name: Package relay
        run: |
          mkdir -p dist/relay
          cp relay/opsview-relay.exe dist/relay/
          cd dist && zip -r ../opsview-relay-windows-amd64.zip relay/

      - uses: actions/upload-artifact@v4
        with:
          name: opsview-relay-windows-amd64
          path: opsview-relay-windows-amd64.zip

  build-relay-docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract tag
        id: tag
        run: echo "version=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - name: Build and push relay image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: relay/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/opsview-relay:${{ steps.tag.outputs.version }}
            ghcr.io/${{ github.repository_owner }}/opsview-relay:latest

  release:
    needs: [build-agent, build-viewer, build-relay-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/*.zip
            artifacts/*.tar.gz
