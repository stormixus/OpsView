<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>OpsView</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a0f;
      color: #e0e0e0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
      user-select: none;
    }

    /* Tab bar */
    .tabs {
      display: flex;
      background: #111118;
      border-bottom: 1px solid #222;
      flex-shrink: 0;
    }
    .tab {
      padding: 8px 24px;
      font-size: 13px;
      font-weight: 500;
      color: #888;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: all 0.15s;
    }
    .tab:hover { color: #bbb; }
    .tab.active {
      color: #60a5fa;
      border-bottom-color: #60a5fa;
    }
    .tab.disabled {
      color: #444;
      cursor: default;
    }

    /* Tab status indicators (right side of tab bar) */
    .tab-status-area {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 12px;
      padding-right: 12px;
      font-size: 11px;
    }
    .tab-status {
      display: flex;
      align-items: center;
      gap: 5px;
      color: #555;
    }
    .tab-status .dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: #444;
    }
    .tab-status .dot.on { background: #22c55e; }
    .tab-status .dot.warn { background: #eab308; animation: pulse 1s infinite; }
    .tab-status .dot.err { background: #ef4444; }
    @keyframes pulse { 50% { opacity: 0.5; } }
    .tab-status .label { color: #666; }
    .tab-status .info { color: #555; font-family: monospace; font-size: 10px; }
    .fullscreen-btn {
      background: none;
      border: 1px solid #333;
      border-radius: 4px;
      color: #777;
      font-size: 14px;
      width: 26px;
      height: 26px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
      padding: 0;
      line-height: 1;
    }
    .fullscreen-btn:hover { color: #e0e0e0; border-color: #555; background: #222; }

    /* Panels */
    .panel {
      flex: 1;
      display: none;
      overflow: hidden;
    }
    .panel.active { display: flex; }

    .canvas-wrap {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #000;
    }
    canvas {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .placeholder {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #444;
      font-size: 18px;
    }

    /* Ops setup overlay */
    .ops-setup {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.85);
      z-index: 10;
    }
    .ops-setup.hidden { display: none; }
    .ops-setup-btn {
      background: #2563eb;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 14px 32px;
      font-size: 15px;
      cursor: pointer;
      transition: background 0.15s;
    }
    .ops-setup-btn:hover { background: #1d4ed8; }
    .ops-setup-btn.edit {
      padding: 4px 12px;
      font-size: 11px;
      border-radius: 4px;
      background: rgba(37,99,235,0.6);
    }
    .ops-setup-btn.edit:hover { background: #2563eb; }
    .ops-setup-btn.disconnect {
      background: #dc2626;
      padding: 4px 12px;
      font-size: 11px;
      border-radius: 4px;
    }
    .ops-setup-btn.disconnect:hover { background: #b91c1c; }
    .ops-form {
      background: #111118;
      border: 1px solid #333;
      border-radius: 8px;
      padding: 20px 24px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      width: 380px;
    }
    .ops-form h3 {
      font-size: 14px;
      color: #e0e0e0;
      margin-bottom: 4px;
    }
    .ops-form label { color: #777; font-size: 11px; }
    .ops-form input {
      background: #1a1a24;
      color: #e0e0e0;
      border: 1px solid #333;
      border-radius: 4px;
      padding: 6px 10px;
      font-size: 12px;
      width: 100%;
    }
    .ops-form input:focus { border-color: #2563eb; outline: none; }
    .ops-form .form-row {
      display: flex;
      gap: 8px;
      align-items: center;
    }
    .ops-form .form-row > div { flex: 1; display: flex; flex-direction: column; gap: 3px; }
    .ops-form button {
      background: #2563eb;
      color: #fff;
      border: none;
      border-radius: 4px;
      padding: 8px 16px;
      cursor: pointer;
      font-size: 12px;
    }
    .ops-form button:hover { background: #1d4ed8; }
    .ops-form button.secondary { background: #333; }
    .ops-form button.secondary:hover { background: #444; }
    .ops-form .btn-row { display: flex; gap: 8px; margin-top: 4px; }
    .ops-form .divider {
      text-align: center;
      color: #444;
      font-size: 11px;
      margin: 6px 0;
      border-top: 1px solid #222;
      padding-top: 10px;
    }
    .ops-option-header {
      font-size: 12px;
      font-weight: 600;
      color: #60a5fa;
      margin-bottom: 2px;
    }
    .ops-form .status-msg {
      font-size: 11px;
      text-align: center;
    }
    .ops-toolbar {
      position: absolute;
      top: 6px;
      right: 6px;
      display: flex;
      gap: 6px;
      z-index: 11;
      opacity: 0;
      transition: opacity 0.2s;
      pointer-events: none;
    }
    #panel-ops:hover .ops-toolbar.visible { opacity: 1; pointer-events: auto; }

    /* CCTV DVR sub-tabs */
    .dvr-tabs {
      display: flex;
      background: #0d0d14;
      border-bottom: 1px solid #1a1a24;
      flex-shrink: 0;
      overflow-x: auto;
    }
    .dvr-tab {
      padding: 5px 16px;
      font-size: 11px;
      color: #777;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      white-space: nowrap;
      transition: all 0.15s;
    }
    .dvr-tab:hover { color: #bbb; }
    .dvr-tab.active { color: #60a5fa; border-bottom-color: #60a5fa; }
    .dvr-tab.add-dvr { color: #22c55e; }
    .dvr-tab .edit-btn, .dvr-tab .del-btn {
      margin-left: 6px;
      color: #555;
      font-size: 10px;
      cursor: pointer;
    }
    .dvr-tab .edit-btn:hover { color: #60a5fa; }
    .dvr-tab .del-btn:hover { color: #ef4444; }

    .dvr-form {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 16px;
      background: #111118;
      border-bottom: 1px solid #222;
      font-size: 11px;
      flex-shrink: 0;
      flex-wrap: wrap;
    }
    .dvr-form label { color: #777; }
    .dvr-form input, .dvr-form select {
      background: #1a1a24;
      color: #e0e0e0;
      border: 1px solid #333;
      border-radius: 3px;
      padding: 3px 6px;
      font-size: 11px;
    }
    .dvr-form button {
      background: #2563eb;
      color: #fff;
      border: none;
      border-radius: 3px;
      padding: 4px 12px;
      cursor: pointer;
      font-size: 11px;
    }
    .dvr-form button:hover { background: #1d4ed8; }

    /* CCTV Grid */
    .cctv-grid, .mixed-cctv-grid {
      position: relative;
    }
    .cctv-grid {
      flex: 1;
      display: grid;
      gap: 4px;
      padding: 4px;
      background: #000;
      overflow-y: auto;
      align-content: start;
    }
    .cctv-grid.grid-2 { grid-template-columns: repeat(2, 1fr); }
    .cctv-grid.grid-3 { grid-template-columns: repeat(3, 1fr); }
    .cctv-grid.grid-4 { grid-template-columns: repeat(4, 1fr); }

    /* Grid layout selector */
    .grid-layout-bar {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 4px 8px;
      background: #0d0d14;
      border-bottom: 1px solid #1a1a24;
      flex-shrink: 0;
    }
    .grid-layout-bar span { color: #555; font-size: 10px; margin-right: 2px; }
    .grid-btn {
      background: #1a1a24;
      border: 1px solid #333;
      border-radius: 3px;
      color: #888;
      font-size: 10px;
      padding: 2px 8px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .grid-btn:hover { color: #ccc; border-color: #555; }
    .grid-btn.active { color: #60a5fa; border-color: #60a5fa; background: rgba(96,165,250,0.1); }

    /* Cell expand/collapse motion tween */
    .cctv-cell {
      transition: transform 0.45s cubic-bezier(0.4, 0, 0.2, 1),
                  opacity 0.45s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .cctv-cell.cell-shrink {
      transform: scale(0.3);
      opacity: 0;
      pointer-events: none;
    }

    /* Expanded overlay - animates from cell position to full grid */
    .cctv-expand-overlay {
      position: absolute;
      z-index: 20;
      background: #000;
      display: none;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      overflow: hidden;
      border-radius: 4px;
      transition: left 0.45s cubic-bezier(0.4, 0, 0.2, 1),
                  top 0.45s cubic-bezier(0.4, 0, 0.2, 1),
                  width 0.45s cubic-bezier(0.4, 0, 0.2, 1),
                  height 0.45s cubic-bezier(0.4, 0, 0.2, 1),
                  border-radius 0.45s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .cctv-expand-overlay.active {
      left: 0 !important;
      top: 0 !important;
      width: 100% !important;
      height: 100% !important;
      border-radius: 0;
    }
    .cctv-expand-overlay img, .cctv-expand-overlay video {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }
    .cctv-expand-overlay .expand-label {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      background: rgba(0,0,0,0.7);
      padding: 8px 14px;
      font-size: 13px;
      color: #ccc;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .cctv-expand-overlay .expand-hint {
      color: #555;
      font-size: 11px;
    }
    .cctv-cell {
      position: relative;
      background: #0a0a14;
      border: 2px solid #222;
      border-radius: 4px;
      overflow: hidden;
      cursor: grab;
      transition: border-color 0.2s ease;
    }
    .cctv-cell:active { cursor: grabbing; }
    .sortable-ghost {
      opacity: 0.3;
      border-color: #3b82f6;
      box-shadow: 0 0 20px rgba(59,130,246,0.3);
    }
    .sortable-chosen {
      border-color: #60a5fa;
      box-shadow: 0 4px 20px rgba(0,0,0,0.5);
    }
    .sortable-drag {
      opacity: 0.9;
      transform: scale(1.02);
      border-color: #3b82f6;
      box-shadow: 0 8px 30px rgba(59,130,246,0.4);
    }
    .sortable-fallback {
      opacity: 0.85;
      transform: scale(1.05);
      border-color: #60a5fa;
      box-shadow: 0 12px 40px rgba(59,130,246,0.5);
    }
    .cctv-cell img, .cctv-cell video {
      width: 100%;
      height: 100%;
      object-fit: contain;
      background: #000;
      display: block;
    }
    .cctv-cell .ch-label {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      background: rgba(0,0,0,0.75);
      padding: 3px 8px;
      font-size: 11px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .cctv-cell .ch-name {
      border: none;
      background: transparent;
      font-size: 11px;
      color: #e0e0e0;
      width: 100%;
      outline: none;
      cursor: text;
    }
    .cctv-cell .ch-name:focus {
      background: #1a1a24;
      border-radius: 2px;
      padding: 1px 4px;
    }
    .cctv-cell .ch-id {
      color: #555;
      font-size: 10px;
      margin-left: 6px;
      white-space: nowrap;
    }
    .cctv-cell .ch-res {
      color: #444;
      font-size: 9px;
      margin-left: 4px;
    }
    .cctv-no-channels {
      grid-column: 1 / -1;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #444;
      font-size: 16px;
      min-height: 200px;
    }

    /* Mixed split pane */
    .mixed-split {
      display: flex;
      flex: 1;
      overflow: hidden;
    }
    .mixed-left {
      display: flex;
      flex-direction: column;
      overflow: hidden;
      min-width: 200px;
      flex-shrink: 0;
      flex-grow: 0;
    }
    .mixed-divider {
      width: 5px;
      background: #222;
      cursor: col-resize;
      flex-shrink: 0;
      transition: background 0.15s;
    }
    .mixed-divider:hover, .mixed-divider.dragging { background: #3b82f6; }
    .mixed-right {
      flex: 1;
      display: flex;
      position: relative;
      overflow: hidden;
      min-width: 200px;
      background: #000;
    }
    .mixed-right .canvas-wrap {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .mixed-right canvas {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }
    .mixed-cctv-grid {
      flex: 1;
      display: grid;
      gap: 3px;
      padding: 3px;
      background: #000;
      overflow-y: auto;
      align-content: center;
      width: 100%;
    }
    .mixed-cctv-grid.cols-3 { grid-template-columns: repeat(3, 1fr); }
    .mixed-cctv-grid.cols-4 { grid-template-columns: repeat(4, 1fr); }
    .mixed-cctv-grid .cctv-cell { cursor: default; }

    /* Region select */
    .region-toolbar {
      position: absolute;
      top: 6px;
      left: 6px;
      display: flex;
      gap: 4px;
      z-index: 12;
      opacity: 0;
      transition: opacity 0.2s;
      pointer-events: none;
    }
    .mixed-right:hover .region-toolbar {
      opacity: 1;
      pointer-events: auto;
    }
    .region-btn {
      background: rgba(37,99,235,0.7);
      color: #fff;
      border: none;
      border-radius: 4px;
      padding: 4px 10px;
      font-size: 10px;
      cursor: pointer;
    }
    .region-btn:hover { background: #2563eb; }
    .region-btn.active { background: #22c55e; }
    .region-select-overlay {
      position: absolute;
      inset: 0;
      cursor: crosshair;
      z-index: 11;
      display: none;
    }
    .region-rect {
      position: absolute;
      border: 2px dashed #60a5fa;
      background: rgba(96,165,250,0.1);
      pointer-events: none;
    }
  </style>
</head>
<body>
  <!-- Tabs -->
  <div class="tabs">
    <div class="tab active" data-panel="ops" onclick="switchTab(this)">화면</div>
    <div class="tab" data-panel="cctv" onclick="switchTab(this)">CCTV</div>
    <div class="tab" data-panel="mixed" onclick="switchTab(this)">같이보기</div>
    <button class="fullscreen-btn" onclick="refreshCurrentTab()" title="새로고침" style="margin-left:8px;">&#x21BB;</button>
    <div class="tab-status-area">
      <div class="tab-status" id="opsStatus">
        <span class="dot" id="statusDot"></span>
        <span class="label">Ops</span>
        <span class="info" id="stats"></span>
      </div>
      <div class="tab-status" id="cctvStatus">
        <span class="dot" id="cctvDot"></span>
        <span class="label">CCTV</span>
        <span class="info" id="cctvInfo"></span>
      </div>
      <button class="fullscreen-btn" id="fullscreenBtn" onclick="toggleFullscreen()" title="전체 화면 (F11)">&#x26F6;</button>
    </div>
  </div>

  <!-- Update banner -->
  <div id="updateBanner" style="display:none;background:#1e3a5f;border-bottom:1px solid #2563eb;padding:6px 16px;font-size:12px;color:#93c5fd;display:none;align-items:center;gap:10px;flex-shrink:0;">
    <span id="updateMsg"></span>
    <button id="updateBtn" onclick="doUpdate()" style="background:#2563eb;color:#fff;border:none;border-radius:4px;padding:4px 12px;font-size:11px;cursor:pointer;">업데이트</button>
    <span id="updateProgress" style="display:none;color:#60a5fa;font-size:11px;"></span>
    <button onclick="dismissUpdate()" style="background:none;border:none;color:#555;cursor:pointer;margin-left:auto;font-size:14px;">&times;</button>
  </div>

  <!-- Panels -->
  <div class="panel active" id="panel-ops" style="position:relative;">
    <!-- Toolbar (visible when playing) -->
    <div class="ops-toolbar" id="opsToolbar">
      <button class="ops-setup-btn edit" onclick="showOpsSetup()">설정</button>
      <button class="ops-setup-btn disconnect" onclick="opsDisconnect()">연결 해제</button>
    </div>
    <!-- Setup: 2 options -->
    <div class="ops-setup" id="opsSetup">
      <div class="ops-form">
        <h3>화면 소스</h3>
        <!-- Option 1: Relay -->
        <div class="ops-option-header">OpsView 릴레이</div>
        <div>
          <label>WebSocket URL</label>
          <input type="text" id="relayUrl" placeholder="ws://127.0.0.1:8080/watch" value="ws://127.0.0.1:8080/watch">
        </div>
        <div>
          <label>토큰</label>
          <input type="password" id="token" placeholder="watcher token" value="dev-watcher-token">
        </div>
        <div class="btn-row">
          <button onclick="opsConnect()">릴레이 연결</button>
        </div>
        <div class="status-msg" id="opsRelayStatus"></div>
        <div class="divider">또는</div>
        <!-- Option 2: Stream -->
        <div class="ops-option-header">직접 스트림</div>
        <div>
          <label>RTSP / M3U8 / Video URL</label>
          <input type="text" id="fallbackUrl" placeholder="http://... .m3u8 or rtsp://...">
        </div>
        <div class="btn-row">
          <button onclick="opsStreamPlay()">스트림 재생</button>
        </div>
        <div class="status-msg" id="opsStreamStatus"></div>
      </div>
    </div>
    <!-- Canvas for relay -->
    <div class="canvas-wrap" id="opsCanvasWrap" style="display:none;">
      <canvas id="screen"></canvas>
    </div>
    <!-- Video for stream -->
    <div class="canvas-wrap" id="opsStreamWrap" style="display:none;">
      <video id="streamVideo" autoplay muted playsinline style="width:100%;height:100%;object-fit:contain;"></video>
    </div>
  </div>
  <div class="panel" id="panel-cctv" style="flex-direction:column;">
    <!-- DVR sub-tabs -->
    <div class="dvr-tabs" id="dvrTabs">
      <div class="dvr-tab add-dvr" onclick="showAddDVR()">+ DVR 추가</div>
    </div>
    <!-- Add DVR form (hidden by default) -->
    <div class="dvr-form" id="dvrForm" style="display:none;">
      <label>이름:</label>
      <input type="text" id="dvrName" placeholder="내 DVR" style="width:100px">
      <label>IP:</label>
      <input type="text" id="dvrAddr" placeholder="192.168.1.64" style="width:130px">
      <label>포트:</label>
      <input type="number" id="dvrPort" value="80" style="width:50px">
      <label>계정:</label>
      <input type="text" id="dvrUser" value="admin" style="width:70px">
      <label>비밀번호:</label>
      <input type="password" id="dvrPass" style="width:80px">
      <label>프로토콜:</label>
      <select id="dvrProtocol" onchange="onProtocolChange()">
        <option value="isapi">ISAPI</option>
        <option value="rtsp">RTSP</option>
      </select>
      <label>화질:</label>
      <select id="dvrQuality"><option value="sub">보조</option><option value="main">메인</option></select>
      <label>갱신:</label>
      <select id="dvrRefresh">
        <option value="1000">1s</option>
        <option value="2000" selected>2s</option>
        <option value="3000">3s</option>
        <option value="5000">5s</option>
      </select>
      <button id="dvrSaveBtn" onclick="saveDVR()">저장 후 연결</button>
      <button onclick="hideDVRForm()" style="background:#666;">취소</button>
      <button id="dvrTestBtn" onclick="testDVRConn()" style="background:#334155;">RTSP 테스트</button>
      <span id="dvrStatus" style="color:#888;margin-left:8px;"></span>
    </div>
    <!-- Grid layout selector -->
    <div class="grid-layout-bar" id="gridLayoutBar">
      <span>그리드:</span>
      <button class="grid-btn" data-cols="2" onclick="setGridLayout(2)">2x2</button>
      <button class="grid-btn active" data-cols="3" onclick="setGridLayout(3)">3x3</button>
      <button class="grid-btn" data-cols="4" onclick="setGridLayout(4)">4x4</button>
    </div>
    <!-- Channel grid -->
    <div class="cctv-grid grid-3" id="cctvGrid">
      <div class="cctv-no-channels">채널을 보려면 DVR을 추가하세요</div>
    </div>
  </div>
  <div class="panel" id="panel-mixed" style="flex-direction:column;">
    <div class="mixed-split">
      <!-- Left: CCTV -->
      <div class="mixed-left" id="mixedLeft" style="flex-basis:40%;">
        <div class="mixed-cctv-grid" id="mixedCctvGrid">
          <div class="cctv-no-channels">CCTV 채널 없음</div>
        </div>
      </div>
      <!-- Divider -->
      <div class="mixed-divider" id="mixedDivider"></div>
      <!-- Right: Ops -->
      <div class="mixed-right" id="mixedRight">
        <div class="region-toolbar" id="regionToolbar">
          <button class="region-btn" id="regionSelectBtn" onclick="toggleRegionSelect()">영역 선택</button>
          <button class="region-btn" id="regionResetBtn" onclick="resetRegion()" style="display:none;">초기화</button>
        </div>
        <div class="region-select-overlay" id="regionOverlay">
          <div class="region-rect" id="regionRect"></div>
        </div>
        <div class="canvas-wrap">
          <canvas id="mixedScreen"></canvas>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/fzstd@0.1.1/umd/index.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.17/dist/hls.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.6/Sortable.min.js"></script>
  <script src="viewer.js"></script>
  <script>
    // Tab switching (saves last tab)
    function switchTab(el) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
      el.classList.add('active');
      const panel = el.dataset.panel;
      document.getElementById('panel-' + panel).classList.add('active');
      localStorage.setItem('opsview_last_tab', panel);
    }

    // Fullscreen toggle via Wails runtime
    let isFullscreen = false;
    function refreshCurrentTab() {
      const activePanel = document.querySelector('.panel.active');
      if (!activePanel) return;
      if (activePanel.id === 'panel-cctv' && activeDvrId) {
        cleanupAllStreams();
        if (CM()) CM().StopDVRStreams(activeDvrId).catch(() => {});
        const dvr = dvrs.find(d => d.id === activeDvrId);
        if (dvr) renderCCTVGrid(dvr);
      } else if (activePanel.id === 'panel-mixed') {
        cleanupMixedPCs();
        if (activeDvrId && CM()) CM().StopDVRStreams(activeDvrId).catch(() => {});
        renderMixedCCTV();
      }
    }

    function toggleFullscreen() {
      if (!window.runtime) return;
      if (isFullscreen) {
        window.runtime.WindowUnfullscreen();
      } else {
        window.runtime.WindowFullscreen();
      }
      isFullscreen = !isFullscreen;
    }

    document.addEventListener('keydown', e => {
      if (e.key === 'F11') {
        e.preventDefault();
        toggleFullscreen();
      }
      if (e.key === 'Escape' && expandedOverlay) {
        collapseCell();
      }
    });

    // Load saved config into form fields
    (function initOpsConfig() {
      const savedUrl = localStorage.getItem('opsview_relay_url');
      const savedToken = localStorage.getItem('opsview_token');
      const savedFallback = localStorage.getItem('opsview_fallback_url');
      if (savedUrl) document.getElementById('relayUrl').value = savedUrl;
      if (savedToken) document.getElementById('token').value = savedToken;
      if (savedFallback) document.getElementById('fallbackUrl').value = savedFallback;
      if (window.go && window.go.main && window.go.main.App) {
        window.go.main.App.GetConfig().then(cfg => {
          if (cfg.url) document.getElementById('relayUrl').value = cfg.url;
          if (cfg.token) document.getElementById('token').value = cfg.token;
        });
      }
    })();

    // Restore last tab + auto-start
    (function restoreLastTab() {
      const lastTab = localStorage.getItem('opsview_last_tab');
      if (lastTab && lastTab !== 'ops') {
        const tabEl = document.querySelector('.tab[data-panel="' + lastTab + '"]');
        if (tabEl) switchTab(tabEl);
      }
      // Auto-connect Ops if we have saved relay or stream URL
      const lastOpsMode = localStorage.getItem('opsview_ops_mode'); // 'relay' or 'stream'
      if (lastOpsMode === 'relay' && localStorage.getItem('opsview_relay_url')) {
        setTimeout(() => opsConnect(), 500);
      } else if (lastOpsMode === 'stream' && localStorage.getItem('opsview_fallback_url')) {
        setTimeout(() => opsStreamPlay(), 500);
      }
    })();

    // === Ops Panel UI ===
    let hlsInstance = null;
    let streamMode = false; // true = playing direct stream

    function showOpsSetup() {
      // Stop everything and show setup
      opsDisconnect();
    }

    function opsConnect() {
      const url = document.getElementById('relayUrl').value.trim();
      const token = document.getElementById('token').value.trim();
      if (!url) {
        document.getElementById('opsRelayStatus').textContent = '릴레이 URL을 입력하세요';
        document.getElementById('opsRelayStatus').style.color = '#ef4444';
        return;
      }
      localStorage.setItem('opsview_relay_url', url);
      localStorage.setItem('opsview_token', token);
      localStorage.setItem('opsview_ops_mode', 'relay');
      document.getElementById('opsRelayStatus').textContent = '연결 중...';
      document.getElementById('opsRelayStatus').style.color = '#eab308';

      stopStream();
      document.getElementById('opsCanvasWrap').style.display = 'flex';
      document.getElementById('opsStreamWrap').style.display = 'none';
      streamMode = false;

      connect();

      let checks = 0;
      const checker = setInterval(() => {
        checks++;
        if (connected) {
          clearInterval(checker);
          document.getElementById('opsRelayStatus').textContent = '';
          document.getElementById('opsSetup').style.display = 'none';
          document.getElementById('opsToolbar').classList.add('visible');
        } else if (checks > 30) {
          clearInterval(checker);
          document.getElementById('opsRelayStatus').textContent = '연결 실패';
          document.getElementById('opsRelayStatus').style.color = '#ef4444';
        }
      }, 200);
    }

    function opsDisconnect() {
      disconnect();
      stopStream();
      streamMode = false;
      localStorage.removeItem('opsview_ops_mode');
      document.getElementById('opsToolbar').classList.remove('visible');
      document.getElementById('opsSetup').style.display = 'flex';
      document.getElementById('opsCanvasWrap').style.display = 'none';
      document.getElementById('opsStreamWrap').style.display = 'none';
    }

    const SP = () => window.go && window.go.main && window.go.main.StreamProxy;

    async function opsStreamPlay() {
      const url = document.getElementById('fallbackUrl').value.trim();
      if (!url) {
        document.getElementById('opsStreamStatus').textContent = '스트림 URL을 입력하세요';
        document.getElementById('opsStreamStatus').style.color = '#ef4444';
        return;
      }
      localStorage.setItem('opsview_fallback_url', url);
      localStorage.setItem('opsview_ops_mode', 'stream');
      document.getElementById('opsStreamStatus').textContent = '로딩 중...';
      document.getElementById('opsStreamStatus').style.color = '#eab308';

      if (connected) disconnect();
      stopStream();

      const video = document.getElementById('streamVideo');
      document.getElementById('opsCanvasWrap').style.display = 'none';
      document.getElementById('opsStreamWrap').style.display = 'flex';
      streamMode = true;

      function onPlaying() {
        document.getElementById('opsStreamStatus').textContent = '';
        document.getElementById('opsSetup').style.display = 'none';
        document.getElementById('opsToolbar').classList.add('visible');
      }
      function onError(msg) {
        document.getElementById('opsStreamStatus').textContent = msg;
        document.getElementById('opsStreamStatus').style.color = '#ef4444';
      }

      // RTSP: use Go backend ffmpeg proxy → HLS
      if (url.startsWith('rtsp://')) {
        if (!SP()) { onError('스트림 프록시를 사용할 수 없음'); return; }
        try {
          document.getElementById('opsStreamStatus').textContent = 'RTSP 변환 시작 중...';
          const hlsUrl = await SP().StartStream(url);
          playHLS(hlsUrl, video, onPlaying, onError);
        } catch(e) {
          onError('RTSP 오류: ' + e);
        }
        return;
      }

      // M3U8: play directly via HLS.js
      if (url.includes('.m3u8')) {
        playHLS(url, video, onPlaying, onError);
        return;
      }

      // Direct video URL (mp4, etc)
      video.src = url;
      video.onloadeddata = () => onPlaying();
      video.onerror = () => onError('스트림 로드 실패');
      video.play().catch(() => {});
    }

    function playHLS(url, video, onPlaying, onError) {
      if (typeof Hls !== 'undefined' && Hls.isSupported()) {
        hlsInstance = new Hls({ enableWorker: true, lowLatencyMode: true });
        hlsInstance.loadSource(url);
        hlsInstance.attachMedia(video);
        hlsInstance.on(Hls.Events.MANIFEST_PARSED, () => { video.play(); onPlaying(); });
        hlsInstance.on(Hls.Events.ERROR, (e, data) => { if (data.fatal) onError('HLS 오류: ' + data.type); });
      } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
        video.src = url;
        video.addEventListener('loadedmetadata', () => { video.play(); onPlaying(); });
        video.onerror = () => onError('HLS 로드 실패');
      } else {
        onError('HLS 미지원');
      }
    }

    function stopStream() {
      if (hlsInstance) { hlsInstance.destroy(); hlsInstance = null; }
      const video = document.getElementById('streamVideo');
      if (video) { video.pause(); video.removeAttribute('src'); video.load(); }
      // Stop ffmpeg backend
      if (SP()) { SP().StopStream().catch(() => {}); }
    }

    // === CCTV Multi-DVR ===
    const CM = () => window.go && window.go.main && window.go.main.CCTVManager;
    let dvrs = [];
    let activeDvrId = null;
    let cctvChannels = [];
    let cctvTimers = [];
    // Shared map of active WebRTC streams: key "dvrID_chNum" → { pc, stream }
    let channelStreams = {};
    let channelPeerConns = [];
    let mixedPeerConns = [];

    function cleanupChannelPCs() {
      channelPeerConns.forEach(pc => { try { pc.close(); } catch(e) {} });
      channelPeerConns = [];
    }
    function cleanupMixedPCs() {
      mixedPeerConns.forEach(pc => { try { pc.close(); } catch(e) {} });
      mixedPeerConns = [];
    }
    function cleanupAllStreams() {
      cleanupChannelPCs();
      cleanupMixedPCs();
      channelStreams = {};
    }

    const MAX_RETRIES = 5;
    const MAX_CONCURRENT = 4;

    async function startRTSPChannel(dvrID, chNum, video, instanceArr) {
      const key = dvrID + '_' + chNum;
      const cell = video.parentElement;
      let retries = 0;

      // Reuse existing stream if available
      if (channelStreams[key] && channelStreams[key].stream) {
        video.srcObject = channelStreams[key].stream;
        video.play().catch(() => {});
        return;
      }

      // Status element
      let statusEl = cell.querySelector('.ch-status');
      if (!statusEl) {
        statusEl = document.createElement('div');
        statusEl.className = 'ch-status';
        statusEl.style.cssText = 'position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:#888;font-size:11px;text-align:center;padding:8px;pointer-events:none;z-index:1;';
        cell.appendChild(statusEl);
      }

      async function attempt() {
        if (!CM()) return;
        statusEl.style.color = '#888';
        statusEl.textContent = 'CH' + chNum + ' 연결 중...' + (retries > 0 ? ' (재시도 ' + retries + '/' + MAX_RETRIES + ')' : '');

        // Clean up previous PC for this channel
        if (channelStreams[key] && channelStreams[key].pc) {
          try { channelStreams[key].pc.close(); } catch(e) {}
          delete channelStreams[key];
        }

        try {
          console.log('[cctv] ch' + chNum + ': attempt ' + (retries + 1));
          const pc = new RTCPeerConnection({
            iceServers: [{ urls: 'stun:stun.l.google.com:19302' }]
          });
          pc.addTransceiver('video', { direction: 'recvonly' });

          pc.ontrack = e => {
            console.log('[cctv] ch' + chNum + ': ontrack fired');
            const stream = e.streams && e.streams[0] ? e.streams[0] : new MediaStream([e.track]);
            channelStreams[key] = { pc: pc, stream: stream };
            video.srcObject = stream;
            video.style.display = '';
            video.play().catch(() => {});
            if (statusEl && statusEl.parentElement) statusEl.remove();
          };

          // Auto-retry on WebRTC connection failure
          pc.onconnectionstatechange = () => {
            console.log('[cctv] ch' + chNum + ': state=' + pc.connectionState);
            if (pc.connectionState === 'failed') {
              retries++;
              if (retries < MAX_RETRIES) {
                console.log('[cctv] ch' + chNum + ': WebRTC failed, retrying ' + retries + '/' + MAX_RETRIES);
                // Re-add status element if removed
                if (!cell.querySelector('.ch-status')) {
                  statusEl = document.createElement('div');
                  statusEl.className = 'ch-status';
                  statusEl.style.cssText = 'position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:#eab308;font-size:11px;text-align:center;padding:8px;pointer-events:none;z-index:1;';
                  cell.appendChild(statusEl);
                }
                setTimeout(() => attempt(), 2000);
              } else {
                console.log('[cctv] ch' + chNum + ': all retries exhausted, switching to snapshot');
                switchToSnapshot(dvrID, chNum, cell);
              }
            }
          };

          const offer = await pc.createOffer();
          await pc.setLocalDescription(offer);

          await new Promise((resolve) => {
            if (pc.iceGatheringState === 'complete') { resolve(); return; }
            const t = setTimeout(resolve, 3000);
            pc.onicegatheringstatechange = () => {
              if (pc.iceGatheringState === 'complete') { clearTimeout(t); resolve(); }
            };
          });

          const result = await CM().StartChannelStream(dvrID, chNum, pc.localDescription.sdp);
          console.log('[cctv] ch' + chNum + ': WebRTC answer received');
          await pc.setRemoteDescription({ type: 'answer', sdp: result.sdp });
          instanceArr.push(pc);
          video._pc = pc;
        } catch(e) {
          const errMsg = (e && e.message) ? e.message : String(e);
          console.error('[cctv] ch' + chNum + ' attempt failed:', errMsg);
          retries++;
          if (retries < MAX_RETRIES) {
            statusEl.style.color = '#eab308';
            statusEl.textContent = 'CH' + chNum + ' 재시도 ' + retries + '/' + MAX_RETRIES;
            await new Promise(r => setTimeout(r, 2000));
            return attempt();
          } else {
            console.log('[cctv] ch' + chNum + ': all retries exhausted, switching to snapshot');
            switchToSnapshot(dvrID, chNum, cell);
          }
        }
      }

      await attempt();
    }

    // Switch a failed WebRTC channel to ISAPI-style snapshot polling
    function switchToSnapshot(dvrID, chNum, cell) {
      // Remove video and status
      const video = cell.querySelector('video');
      if (video) video.remove();
      const status = cell.querySelector('.ch-status');
      if (status) status.remove();

      // Add img element
      const img = document.createElement('img');
      img.alt = 'CH' + chNum;
      img.src = '/cctv/snapshot/' + dvrID + '/' + chNum + '?t=' + Date.now();
      img.onerror = function() { this.style.opacity = '0.3'; };
      img.onload = function() { this.style.opacity = '1'; };
      cell.insertBefore(img, cell.firstChild);

      // Snapshot polling at 2s intervals
      const timer = setInterval(() => {
        const preload = new Image();
        preload.onload = () => { img.src = preload.src; img.style.opacity = '1'; };
        preload.src = '/cctv/snapshot/' + dvrID + '/' + chNum + '?t=' + Date.now();
      }, 2000);
      cctvTimers.push(timer);
      console.log('[cctv] ch' + chNum + ': switched to snapshot polling');
    }

    // Concurrent channel connections (4 at a time), all channels attempted
    async function startRTSPChannelsStaggered(dvrID, channels, getVideo, instanceArr) {
      const queue = channels.slice();

      function next() {
        if (queue.length === 0) return;
        const ch = queue.shift();
        const video = getVideo(ch.ch_num);
        if (!video || !CM()) { next(); return; }
        startRTSPChannel(dvrID, ch.ch_num, video, instanceArr).finally(() => next());
      }

      for (let i = 0; i < Math.min(MAX_CONCURRENT, queue.length); i++) {
        next();
      }
    }
    async function loadDVRs() {
      if (!CM()) return;
      try {
        dvrs = await CM().ListDVRs() || [];
        renderDVRTabs();
        updateCCTVStatus();
        if (dvrs.length > 0 && !activeDvrId) {
          selectDVR(dvrs[0].id);
        }
      } catch(e) { console.error('loadDVRs:', e); }
    }

    function renderDVRTabs() {
      const bar = document.getElementById('dvrTabs');
      bar.innerHTML = '';
      dvrs.forEach(d => {
        const tab = document.createElement('div');
        tab.className = 'dvr-tab' + (d.id === activeDvrId ? ' active' : '');
        tab.innerHTML = d.name
          + '<span class="edit-btn" title="Edit DVR">&#9998;</span>'
          + '<span class="del-btn" title="Delete DVR">&times;</span>';
        tab.addEventListener('click', e => {
          if (e.target.classList.contains('del-btn')) { deleteDVR(d.id); return; }
          if (e.target.classList.contains('edit-btn')) { showEditDVR(d.id); return; }
          selectDVR(d.id);
        });
        bar.appendChild(tab);
      });
      const addTab = document.createElement('div');
      addTab.className = 'dvr-tab add-dvr';
      addTab.textContent = '+ DVR 추가';
      addTab.onclick = showAddDVR;
      bar.appendChild(addTab);
    }

    function updateCCTVStatus() {
      const dot = document.getElementById('cctvDot');
      const info = document.getElementById('cctvInfo');
      if (!dot || !info) return;
      const en = cctvChannels.filter(c => c.enabled).length;
      if (en > 0) {
        dot.className = 'dot on';
        const dvrName = dvrs.find(d => d.id === activeDvrId);
        info.textContent = (dvrName ? dvrName.name + ' ' : '') + en + 'ch';
      } else if (dvrs.length > 0) {
        dot.className = 'dot warn';
        info.textContent = dvrs.length + ' DVR';
      } else {
        dot.className = 'dot';
        info.textContent = '';
      }
    }

    async function selectDVR(id) {
      // Stop previous RTSP streams when switching DVRs
      if (activeDvrId && activeDvrId !== id) {
        const prevDvr = dvrs.find(d => d.id === activeDvrId);
        if (prevDvr && prevDvr.protocol === 'rtsp' && CM()) {
          cleanupAllStreams();
          CM().StopDVRStreams(activeDvrId).catch(() => {});
        }
      }
      activeDvrId = id;
      renderDVRTabs();
      hideDVRForm();
      if (!CM()) return;
      try {
        cctvChannels = await CM().ListChannels(id) || [];
        if (cctvChannels.length === 0) {
          setDVRStatus('채널 탐색 중...', '#eab308');
          cctvChannels = await CM().DiscoverChannels(id) || [];
          setDVRStatus(cctvChannels.length + '개 채널', '#22c55e');
        }
        const dvr = dvrs.find(d => d.id === id);
        renderCCTVGrid(dvr);
        renderMixedCCTV();
        updateCCTVStatus();
      } catch(e) {
        setDVRStatus('Error: ' + e, '#ef4444');
      }
    }

    let editingDvrId = null; // null = add mode, number = edit mode

    function onProtocolChange() {
      const proto = document.getElementById('dvrProtocol').value;
      const portEl = document.getElementById('dvrPort');
      if (proto === 'rtsp' && (portEl.value === '80' || portEl.value === '')) {
        portEl.value = '554';
      } else if (proto === 'isapi' && portEl.value === '554') {
        portEl.value = '80';
      }
    }

    function showAddDVR() {
      editingDvrId = null;
      document.getElementById('dvrForm').style.display = 'flex';
      document.getElementById('dvrName').value = '';
      document.getElementById('dvrAddr').value = '';
      document.getElementById('dvrPort').value = '80';
      document.getElementById('dvrUser').value = 'admin';
      document.getElementById('dvrPass').value = '';
      document.getElementById('dvrProtocol').value = 'isapi';
      document.getElementById('dvrQuality').value = 'sub';
      document.getElementById('dvrRefresh').value = '2000';
      document.getElementById('dvrSaveBtn').textContent = '저장 후 연결';
      setDVRStatus('', '');
      document.getElementById('dvrAddr').focus();
    }

    function showEditDVR(id) {
      const d = dvrs.find(v => v.id === id);
      if (!d) return;
      editingDvrId = id;
      document.getElementById('dvrForm').style.display = 'flex';
      document.getElementById('dvrName').value = d.name || '';
      document.getElementById('dvrAddr').value = d.addr || '';
      document.getElementById('dvrPort').value = d.port || 80;
      document.getElementById('dvrUser').value = d.username || 'admin';
      document.getElementById('dvrPass').value = d.password || '';
      document.getElementById('dvrProtocol').value = d.protocol || 'isapi';
      document.getElementById('dvrQuality').value = d.stream_quality || 'sub';
      document.getElementById('dvrRefresh').value = d.refresh_rate || 2000;
      document.getElementById('dvrSaveBtn').textContent = '업데이트';
      setDVRStatus('', '');
      document.getElementById('dvrName').focus();
    }

    function hideDVRForm() {
      document.getElementById('dvrForm').style.display = 'none';
      editingDvrId = null;
    }

    async function saveDVR() {
      if (!CM()) return;
      const name = document.getElementById('dvrName').value.trim();
      const addr = document.getElementById('dvrAddr').value.trim();
      const port = parseInt(document.getElementById('dvrPort').value) || 80;
      const user = document.getElementById('dvrUser').value.trim();
      const pass = document.getElementById('dvrPass').value;
      const protocol = document.getElementById('dvrProtocol').value;
      const quality = document.getElementById('dvrQuality').value;
      const refresh = parseInt(document.getElementById('dvrRefresh').value) || 2000;

      if (!addr) { setDVRStatus('DVR 주소를 입력하세요', '#ef4444'); return; }
      setDVRStatus('저장 중...', '#eab308');

      try {
        if (editingDvrId) {
          // Update existing DVR
          await CM().UpdateDVR(editingDvrId, name || addr, addr, port, user, pass, refresh, quality, protocol);
          const d = dvrs.find(v => v.id === editingDvrId);
          if (d) {
            d.name = name || addr; d.addr = addr; d.port = port;
            d.username = user; d.password = pass;
            d.refresh_rate = refresh; d.stream_quality = quality;
            d.protocol = protocol;
          }
          setDVRStatus('업데이트 완료', '#22c55e');
          hideDVRForm();
          renderDVRTabs();
          selectDVR(editingDvrId);
        } else {
          // Add new DVR
          const dvr = await CM().AddDVR(name || addr, addr, port, user, pass, protocol);
          await CM().UpdateDVR(dvr.id, dvr.name, addr, port, user, pass, refresh, quality, protocol);
          dvr.refresh_rate = refresh;
          dvr.stream_quality = quality;
          dvr.protocol = protocol;
          dvrs.push(dvr);
          hideDVRForm();
          selectDVR(dvr.id);
        }
      } catch(e) {
        setDVRStatus('Error: ' + e, '#ef4444');
      }
    }

    async function deleteDVR(id) {
      if (!CM()) return;
      if (!confirm('이 DVR과 모든 채널을 삭제하시겠습니까?')) return;
      try {
        await CM().DeleteDVR(id);
        dvrs = dvrs.filter(d => d.id !== id);
        if (activeDvrId === id) {
          activeDvrId = dvrs.length > 0 ? dvrs[0].id : null;
        }
        renderDVRTabs();
        if (activeDvrId) selectDVR(activeDvrId);
        else { cctvChannels = []; renderCCTVGrid(null); }
      } catch(e) { console.error('deleteDVR:', e); }
    }

    function setDVRStatus(text, color) {
      const el = document.getElementById('dvrStatus');
      el.textContent = text;
      el.style.color = color || '#888';
    }

    async function testDVRConn() {
      if (!CM()) { setDVRStatus('Wails not ready', '#ef4444'); return; }
      const dvrId = editingDvrId || activeDvrId;
      if (!dvrId) { setDVRStatus('DVR을 먼저 선택하세요', '#ef4444'); return; }
      setDVRStatus('RTSP 테스트 중...', '#eab308');
      try {
        const report = await CM().TestDVRConnection(dvrId);
        console.log('[cctv] TestDVRConnection:\n' + report);
        setDVRStatus(report.replace(/\n/g, ' | '), report.includes('H264 OK') ? '#22c55e' : '#ef4444');
      } catch(e) {
        setDVRStatus('Test error: ' + e, '#ef4444');
      }
    }

    // --- Cell expand on double-click (motion tween) ---
    let expandedOverlay = null;
    let expandedSourceCell = null;
    let expandedTimer = null;
    let expandedVideoOriginalParent = null;

    function expandCell(chNum, chName, grid, cellEl) {
      collapseCell(true); // instant collapse if already expanded

      // Shrink all other cells
      grid.querySelectorAll('.cctv-cell').forEach(c => {
        if (c !== cellEl) c.classList.add('cell-shrink');
      });

      // Create/reuse overlay
      let overlay = grid.querySelector('.cctv-expand-overlay');
      if (!overlay) {
        overlay = document.createElement('div');
        overlay.className = 'cctv-expand-overlay';
        overlay.addEventListener('dblclick', () => collapseCell());
        grid.appendChild(overlay);
      }

      // Position overlay exactly at the cell's current position
      const gridRect = grid.getBoundingClientRect();
      const cellRect = cellEl.getBoundingClientRect();
      overlay.style.transition = 'none';
      overlay.style.left = (cellRect.left - gridRect.left) + 'px';
      overlay.style.top = (cellRect.top - gridRect.top + grid.scrollTop) + 'px';
      overlay.style.width = cellRect.width + 'px';
      overlay.style.height = cellRect.height + 'px';
      overlay.style.display = 'flex';
      overlay.classList.remove('active');

      const isRTSP = !!cellEl.querySelector('video');

      if (isRTSP) {
        // Move live video to overlay (keeps HLS connection alive)
        const video = cellEl.querySelector('video');
        expandedVideoOriginalParent = cellEl;
        overlay.innerHTML = '';
        overlay.appendChild(video);
        const label = document.createElement('div');
        label.className = 'expand-label';
        label.innerHTML = '<span class="expand-name">' + chName + ' (CH' + chNum + ')</span><span class="expand-hint">더블클릭: 돌아가기 (ESC)</span>';
        overlay.appendChild(label);
      } else {
        // ISAPI: snapshot image with refresh
        expandedVideoOriginalParent = null;
        overlay.innerHTML = '<img><div class="expand-label"><span class="expand-name"></span><span class="expand-hint">더블클릭: 돌아가기 (ESC)</span></div>';
        const img = overlay.querySelector('img');
        img.src = '/cctv/snapshot/' + activeDvrId + '/' + chNum + '?upscale=2&ai=1&t=' + Date.now();
        overlay.querySelector('.expand-name').textContent = chName + ' (CH' + chNum + ')';

        const dvr = dvrs.find(d => d.id === activeDvrId);
        const refreshMs = (dvr && dvr.refresh_rate) ? dvr.refresh_rate : 2000;
        if (expandedTimer) clearInterval(expandedTimer);
        expandedTimer = setInterval(() => {
          const preload = new Image();
          preload.onload = () => { img.src = preload.src; };
          preload.src = '/cctv/snapshot/' + activeDvrId + '/' + chNum + '?upscale=2&ai=1&t=' + Date.now();
        }, refreshMs);
      }

      // Animate to full grid on next frame
      requestAnimationFrame(() => {
        overlay.style.transition = '';
        overlay.classList.add('active');
      });

      expandedOverlay = overlay;
      expandedSourceCell = cellEl;
    }

    function collapseCell(instant) {
      if (expandedTimer) { clearInterval(expandedTimer); expandedTimer = null; }
      if (!expandedOverlay) return;

      const overlay = expandedOverlay;
      const cellEl = expandedSourceCell;
      const grid = overlay.parentElement;

      // Un-shrink other cells
      grid.querySelectorAll('.cctv-cell.cell-shrink').forEach(c => {
        c.classList.remove('cell-shrink');
      });

      // Move video back to original cell if RTSP
      if (expandedVideoOriginalParent) {
        const video = overlay.querySelector('video');
        if (video && expandedVideoOriginalParent.isConnected) {
          const label = expandedVideoOriginalParent.querySelector('.ch-label');
          expandedVideoOriginalParent.insertBefore(video, label);
        }
        expandedVideoOriginalParent = null;
      }

      if (instant || !cellEl) {
        overlay.style.display = 'none';
        overlay.classList.remove('active');
        expandedOverlay = null;
        expandedSourceCell = null;
        return;
      }

      // Animate back to cell position
      const gridRect = grid.getBoundingClientRect();
      const cellRect = cellEl.getBoundingClientRect();
      overlay.classList.remove('active');
      overlay.style.left = (cellRect.left - gridRect.left) + 'px';
      overlay.style.top = (cellRect.top - gridRect.top + grid.scrollTop) + 'px';
      overlay.style.width = cellRect.width + 'px';
      overlay.style.height = cellRect.height + 'px';

      // Hide after animation completes
      setTimeout(() => {
        overlay.style.display = 'none';
      }, 480);

      expandedOverlay = null;
      expandedSourceCell = null;
    }

    // --- Grid layout ---
    let currentGridCols = parseInt(localStorage.getItem('opsview_grid_cols')) || 3;

    function setGridLayout(cols) {
      currentGridCols = cols;
      localStorage.setItem('opsview_grid_cols', cols);
      const grid = document.getElementById('cctvGrid');
      grid.classList.remove('grid-2', 'grid-3', 'grid-4');
      grid.classList.add('grid-' + cols);
      document.querySelectorAll('#gridLayoutBar .grid-btn').forEach(b => {
        b.classList.toggle('active', parseInt(b.dataset.cols) === cols);
      });
    }

    // Restore saved grid layout
    (function initGridLayout() {
      setGridLayout(currentGridCols);
    })();

    // --- Grid rendering with SortableJS + preload (no flicker) ---
    let sortableInstance = null;

    function renderCCTVGrid(dvr) {
      const grid = document.getElementById('cctvGrid');
      cctvTimers.forEach(t => clearInterval(t));
      cctvTimers = [];
      collapseCell(true);
      cleanupAllStreams();
      if (sortableInstance) { sortableInstance.destroy(); sortableInstance = null; }

      const enabled = cctvChannels.filter(ch => ch.enabled);
      enabled.sort((a, b) => a.order - b.order);

      if (enabled.length === 0) {
        grid.innerHTML = '<div class="cctv-no-channels">채널을 찾을 수 없음</div>';
        return;
      }

      grid.innerHTML = '';
      // Ensure grid layout class is applied
      grid.classList.remove('grid-2', 'grid-3', 'grid-4');
      grid.classList.add('grid-' + currentGridCols);
      const isRTSP = dvr && dvr.protocol === 'rtsp';
      const refreshMs = (dvr && dvr.refresh_rate) ? dvr.refresh_rate : 2000;

      enabled.forEach(ch => {
        const cell = document.createElement('div');
        cell.className = 'cctv-cell';
        cell.dataset.chnum = ch.ch_num;
        cell.style.aspectRatio = '16/9';

        if (isRTSP) {
          // RTSP: <video> (WebRTC or HLS depending on codec)
          const video = document.createElement('video');
          video.autoplay = true;
          video.muted = true;
          video.playsInline = true;
          video.id = 'cctv-video-' + ch.ch_num;
          cell.appendChild(video);
          // Connections started via staggered function after grid is built
        } else {
          // ISAPI: <img> + snapshot polling
          const img = document.createElement('img');
          img.alt = ch.name;
          img.src = '/cctv/snapshot/' + activeDvrId + '/' + ch.ch_num + '?t=' + Date.now();
          img.onerror = function() { this.style.opacity = '0.3'; };
          img.onload = function() {
            this.style.opacity = '1';
            if (this.naturalWidth > 0 && this.naturalHeight > 0 && ch.width === 0) {
              cell.style.aspectRatio = this.naturalWidth + '/' + this.naturalHeight;
            }
          };
          cell.appendChild(img);

          const timer = setInterval(() => {
            const preload = new Image();
            preload.onload = () => {
              img.src = preload.src;
              img.style.opacity = '1';
              if (preload.naturalWidth > 0 && ch.width === 0) {
                cell.style.aspectRatio = preload.naturalWidth + '/' + preload.naturalHeight;
              }
            };
            preload.src = '/cctv/snapshot/' + activeDvrId + '/' + ch.ch_num + '?t=' + Date.now();
          }, refreshMs);
          cctvTimers.push(timer);
        }

        // Label (common)
        const label = document.createElement('div');
        label.className = 'ch-label';
        const nameInput = document.createElement('input');
        nameInput.className = 'ch-name';
        nameInput.value = ch.name;
        nameInput.addEventListener('change', () => renameChannel(ch.id, nameInput.value, ch));
        nameInput.addEventListener('keydown', e => { if (e.key === 'Enter') nameInput.blur(); });
        label.appendChild(nameInput);

        const info = document.createElement('span');
        info.className = 'ch-id';
        info.textContent = 'CH' + ch.ch_num;
        label.appendChild(info);

        if (ch.width > 0) {
          const res = document.createElement('span');
          res.className = 'ch-res';
          res.textContent = ch.width + 'x' + ch.height;
          label.appendChild(res);
        }

        cell.appendChild(label);
        cell.addEventListener('dblclick', (e) => {
          if (e.target.classList.contains('ch-name')) return;
          expandCell(ch.ch_num, ch.name, grid, cell);
        });
        grid.appendChild(cell);
      });

      // Start RTSP streams with staggered connections (after grid is built)
      if (isRTSP && CM()) {
        startRTSPChannelsStaggered(dvr.id, enabled,
          (chNum) => document.getElementById('cctv-video-' + chNum),
          channelPeerConns
        );
      }

      // Initialize SortableJS on the grid
      sortableInstance = new Sortable(grid, {
        animation: 200,
        easing: 'cubic-bezier(0.25, 1, 0.5, 1)',
        ghostClass: 'sortable-ghost',
        chosenClass: 'sortable-chosen',
        dragClass: 'sortable-drag',
        forceFallback: true,
        fallbackClass: 'sortable-fallback',
        delay: 80,
        delayOnTouchOnly: false,
        swapThreshold: 0.65,
        filter: '.ch-name',
        preventOnFilter: false,
        draggable: '.cctv-cell',
        onEnd: function(evt) {
          if (evt.oldIndex === evt.newIndex) return;
          const cells = grid.querySelectorAll('.cctv-cell');
          const newOrder = Array.from(cells).map(c => parseInt(c.dataset.chnum));
          newOrder.forEach((num, i) => {
            const ch = cctvChannels.find(c => c.ch_num === num);
            if (ch) ch.order = i;
          });
          if (CM() && activeDvrId) {
            CM().ReorderChannels(activeDvrId, newOrder).catch(e => console.error('reorder:', e));
          }
        }
      });
    }

    async function renameChannel(id, newName, ch) {
      if (!CM()) return;
      ch.name = newName;
      try { await CM().UpdateChannel(id, newName, ch.order, ch.enabled); }
      catch(e) { console.error('rename:', e); }
    }

    // === Mixed Panel ===

    // Split pane resizer
    (function initSplitPane() {
      const divider = document.getElementById('mixedDivider');
      const left = document.getElementById('mixedLeft');
      const split = divider.parentElement;
      let dragging = false;

      divider.addEventListener('mousedown', e => {
        e.preventDefault();
        dragging = true;
        divider.classList.add('dragging');
        document.body.style.cursor = 'col-resize';
      });
      document.addEventListener('mousemove', e => {
        if (!dragging) return;
        const rect = split.getBoundingClientRect();
        const pct = ((e.clientX - rect.left) / rect.width) * 100;
        const clamped = Math.max(15, Math.min(85, pct));
        left.style.flexBasis = clamped + '%';
        localStorage.setItem('opsview_mixed_split', clamped);
      });
      document.addEventListener('mouseup', () => {
        if (dragging) {
          dragging = false;
          divider.classList.remove('dragging');
          document.body.style.cursor = '';
        }
      });
      // Restore saved split
      const saved = localStorage.getItem('opsview_mixed_split');
      if (saved) left.style.flexBasis = saved + '%';
    })();

    // Mixed CCTV grid (read-only, no DND)
    let mixedCctvTimers = [];
    function renderMixedCCTV() {
      const grid = document.getElementById('mixedCctvGrid');
      mixedCctvTimers.forEach(t => clearInterval(t));
      mixedCctvTimers = [];
      cleanupMixedPCs();

      const enabled = cctvChannels.filter(ch => ch.enabled);
      enabled.sort((a, b) => a.order - b.order);

      if (enabled.length === 0 || !activeDvrId) {
        grid.innerHTML = '<div class="cctv-no-channels">CCTV 채널 없음</div>';
        grid.classList.remove('cols-3', 'cols-4');
        return;
      }

      grid.innerHTML = '';
      grid.classList.remove('cols-3', 'cols-4');
      grid.classList.add(enabled.length <= 9 ? 'cols-3' : 'cols-4');
      // Mixed grid always uses auto cols based on channel count
      const dvr = dvrs.find(d => d.id === activeDvrId);
      const isRTSP = dvr && dvr.protocol === 'rtsp';
      const refreshMs = (dvr && dvr.refresh_rate) ? dvr.refresh_rate : 2000;

      enabled.forEach(ch => {
        const cell = document.createElement('div');
        cell.className = 'cctv-cell';
        if (ch.width > 0 && ch.height > 0) {
          cell.style.aspectRatio = ch.width + '/' + ch.height;
        } else {
          cell.style.aspectRatio = '16/9';
        }

        if (isRTSP) {
          const video = document.createElement('video');
          video.autoplay = true;
          video.muted = true;
          video.playsInline = true;
          video.id = 'mixed-video-' + ch.ch_num;
          cell.appendChild(video);
          // Connections started via staggered function after grid is built
        } else {
          const img = document.createElement('img');
          img.alt = ch.name;
          img.src = '/cctv/snapshot/' + activeDvrId + '/' + ch.ch_num + '?t=' + Date.now();
          img.onerror = function() { this.style.opacity = '0.3'; };
          img.onload = function() { this.style.opacity = '1'; };
          cell.appendChild(img);

          const timer = setInterval(() => {
            const preload = new Image();
            preload.onload = () => { img.src = preload.src; img.style.opacity = '1'; };
            preload.src = '/cctv/snapshot/' + activeDvrId + '/' + ch.ch_num + '?t=' + Date.now();
          }, refreshMs);
          mixedCctvTimers.push(timer);
        }

        const label = document.createElement('div');
        label.className = 'ch-label';
        label.innerHTML = '<span style="font-size:11px;color:#ccc;">' + ch.name + '</span><span class="ch-id">CH' + ch.ch_num + '</span>';
        cell.appendChild(label);
        cell.addEventListener('dblclick', () => {
          expandCell(ch.ch_num, ch.name, grid, cell);
        });
        grid.appendChild(cell);
      });

      // Start RTSP streams with staggered connections (after grid is built)
      if (isRTSP && CM()) {
        startRTSPChannelsStaggered(dvr.id, enabled,
          (chNum) => document.getElementById('mixed-video-' + chNum),
          mixedPeerConns
        );
      }
    }

    // Mixed Ops canvas (mirrors the main canvas region)
    let mixedCanvas, mixedCtx;
    let cropRegion = null; // {x, y, w, h} in source pixels
    let regionSelectActive = false;

    (function initMixedOps() {
      mixedCanvas = document.getElementById('mixedScreen');
      mixedCtx = mixedCanvas.getContext('2d');

      // Mirror Ops source (canvas or video) to mixed canvas every frame
      function mirrorLoop() {
        // Pick source: stream video if active, otherwise relay canvas
        let src = null;
        const video = document.getElementById('streamVideo');
        const canvas = document.getElementById('screen');

        if (streamMode && video && video.readyState >= 2 && video.videoWidth > 0) {
          src = video;
          var srcW = video.videoWidth, srcH = video.videoHeight;
        } else if (canvas && canvas.width > 0 && canvas.height > 0) {
          src = canvas;
          var srcW = canvas.width, srcH = canvas.height;
        }

        if (src) {
          if (cropRegion) {
            mixedCanvas.width = cropRegion.w;
            mixedCanvas.height = cropRegion.h;
            mixedCtx.drawImage(src, cropRegion.x, cropRegion.y, cropRegion.w, cropRegion.h, 0, 0, cropRegion.w, cropRegion.h);
          } else {
            if (mixedCanvas.width !== srcW || mixedCanvas.height !== srcH) {
              mixedCanvas.width = srcW;
              mixedCanvas.height = srcH;
            }
            mixedCtx.drawImage(src, 0, 0);
          }
        }
        requestAnimationFrame(mirrorLoop);
      }
      mirrorLoop();
    })();

    // Region select tool
    function toggleRegionSelect() {
      regionSelectActive = !regionSelectActive;
      const btn = document.getElementById('regionSelectBtn');
      const overlay = document.getElementById('regionOverlay');
      if (regionSelectActive) {
        btn.classList.add('active');
        btn.textContent = '선택 중...';
        overlay.style.display = 'block';
      } else {
        btn.classList.remove('active');
        btn.textContent = '영역 선택';
        overlay.style.display = 'none';
      }
    }

    function resetRegion() {
      cropRegion = null;
      document.getElementById('regionResetBtn').style.display = 'none';
      localStorage.removeItem('opsview_crop_region');
    }

    (function initRegionSelect() {
      const overlay = document.getElementById('regionOverlay');
      const rect = document.getElementById('regionRect');
      let startX, startY, isDragging = false;

      overlay.addEventListener('mousedown', e => {
        const bounds = overlay.getBoundingClientRect();
        startX = e.clientX - bounds.left;
        startY = e.clientY - bounds.top;
        isDragging = true;
        rect.style.left = startX + 'px';
        rect.style.top = startY + 'px';
        rect.style.width = '0';
        rect.style.height = '0';
        rect.style.display = 'block';
      });

      overlay.addEventListener('mousemove', e => {
        if (!isDragging) return;
        const bounds = overlay.getBoundingClientRect();
        const curX = e.clientX - bounds.left;
        const curY = e.clientY - bounds.top;
        const x = Math.min(startX, curX);
        const y = Math.min(startY, curY);
        const w = Math.abs(curX - startX);
        const h = Math.abs(curY - startY);
        rect.style.left = x + 'px';
        rect.style.top = y + 'px';
        rect.style.width = w + 'px';
        rect.style.height = h + 'px';
      });

      overlay.addEventListener('mouseup', e => {
        if (!isDragging) return;
        isDragging = false;

        const bounds = overlay.getBoundingClientRect();
        const curX = e.clientX - bounds.left;
        const curY = e.clientY - bounds.top;

        const selX = Math.min(startX, curX);
        const selY = Math.min(startY, curY);
        const selW = Math.abs(curX - startX);
        const selH = Math.abs(curY - startY);

        if (selW > 10 && selH > 10) {
          // Get source dimensions (video or canvas)
          const video = document.getElementById('streamVideo');
          const canvas = document.getElementById('screen');
          let srcW, srcH;
          if (streamMode && video && video.videoWidth > 0) {
            srcW = video.videoWidth;
            srcH = video.videoHeight;
          } else if (canvas && canvas.width > 0) {
            srcW = canvas.width;
            srcH = canvas.height;
          } else {
            srcW = bounds.width;
            srcH = bounds.height;
          }

          // Account for object-fit:contain letterboxing
          const containerW = bounds.width;
          const containerH = bounds.height;
          const srcRatio = srcW / srcH;
          const containerRatio = containerW / containerH;
          let renderW, renderH, offsetX, offsetY;
          if (srcRatio > containerRatio) {
            // Source wider → pillarboxed top/bottom
            renderW = containerW;
            renderH = containerW / srcRatio;
            offsetX = 0;
            offsetY = (containerH - renderH) / 2;
          } else {
            // Source taller → letterboxed left/right
            renderH = containerH;
            renderW = containerH * srcRatio;
            offsetX = (containerW - renderW) / 2;
            offsetY = 0;
          }

          // Map selection coords to source coords
          const scale = srcW / renderW;
          cropRegion = {
            x: Math.max(0, Math.round((selX - offsetX) * scale)),
            y: Math.max(0, Math.round((selY - offsetY) * scale)),
            w: Math.min(srcW, Math.round(selW * scale)),
            h: Math.min(srcH, Math.round(selH * scale))
          };
          // Clamp to source bounds
          cropRegion.x = Math.min(cropRegion.x, srcW - cropRegion.w);
          cropRegion.y = Math.min(cropRegion.y, srcH - cropRegion.h);
          if (cropRegion.x < 0) cropRegion.x = 0;
          if (cropRegion.y < 0) cropRegion.y = 0;

          localStorage.setItem('opsview_crop_region', JSON.stringify(cropRegion));
          document.getElementById('regionResetBtn').style.display = 'inline-block';
        }

        rect.style.display = 'none';
        toggleRegionSelect(); // Exit select mode
      });

      // Restore saved crop region
      const saved = localStorage.getItem('opsview_crop_region');
      if (saved) {
        try {
          cropRegion = JSON.parse(saved);
          document.getElementById('regionResetBtn').style.display = 'inline-block';
        } catch(e) {}
      }
    })();

    // Update mixed CCTV when tab switches to mixed
    const origSwitchTab = switchTab;
    switchTab = function(el) {
      const prevPanel = document.querySelector('.panel.active');
      // Clean up streams when leaving a tab
      if (prevPanel) {
        if (prevPanel.id === 'panel-mixed') {
          cleanupMixedPCs();
          if (activeDvrId && CM()) CM().StopDVRStreams(activeDvrId).catch(() => {});
        }
        if (prevPanel.id === 'panel-cctv') {
          cleanupChannelPCs();
          if (activeDvrId && CM()) CM().StopDVRStreams(activeDvrId).catch(() => {});
        }
      }
      origSwitchTab(el);
      // Reconnect streams on entering a tab
      if (el.dataset.panel === 'mixed') {
        renderMixedCCTV();
      }
      if (el.dataset.panel === 'cctv' && activeDvrId) {
        const dvr = dvrs.find(d => d.id === activeDvrId);
        if (dvr) renderCCTVGrid(dvr);
      }
    };

    // === Auto-update ===
    const UPD = () => window.go && window.go.main && window.go.main.Updater;
    let pendingUpdate = null;

    async function checkUpdate() {
      if (!UPD()) return;
      try {
        const info = await UPD().CheckForUpdate();
        if (info && info.available) {
          pendingUpdate = info;
          document.getElementById('updateMsg').textContent =
            '새 버전 ' + info.latest_ver + ' 사용 가능 (현재: ' + info.current_ver + ')';
          document.getElementById('updateBanner').style.display = 'flex';
        }
      } catch(e) { console.log('update check:', e); }
    }

    async function doUpdate() {
      if (!pendingUpdate || !UPD()) return;
      const btn = document.getElementById('updateBtn');
      const prog = document.getElementById('updateProgress');
      btn.style.display = 'none';
      prog.style.display = 'inline';
      prog.textContent = '다운로드 중...';
      try {
        const msg = await UPD().DownloadAndInstall(pendingUpdate.download_url);
        prog.textContent = msg || '완료!';
      } catch(e) {
        prog.textContent = '오류: ' + e;
        prog.style.color = '#ef4444';
        btn.style.display = 'inline';
      }
    }

    function dismissUpdate() {
      document.getElementById('updateBanner').style.display = 'none';
    }

    // Check for updates 3s after launch
    setTimeout(checkUpdate, 3000);

    // Init CCTV
    loadDVRs();
  </script>
</body>
