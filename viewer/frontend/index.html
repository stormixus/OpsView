<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>OpsView</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            surface: { 50: '#050c16', 100: '#0a1422', 200: '#101c2f', 300: '#15263f', 400: '#213656' },
          }
        }
      }
    }
  </script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    /* === Base === */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --accent: #22d3ee;
      --accent-strong: #0ea5e9;
      --line-soft: rgba(148, 163, 184, 0.16);
      --panel-glass: rgba(10, 20, 36, 0.82);
    }
    body {
      user-select: none;
      font-family: 'Pretendard Variable', 'SUIT Variable', 'Noto Sans KR', 'Apple SD Gothic Neo', -apple-system, BlinkMacSystemFont, sans-serif;
      background:
        radial-gradient(110% 80% at 10% -10%, rgba(34, 211, 238, 0.16), transparent 52%),
        radial-gradient(90% 90% at 90% -20%, rgba(14, 165, 233, 0.14), transparent 50%),
        #050c16;
      color: #dce7f9;
    }

    /* === Animations === */
    @keyframes pulse-glow { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
    @keyframes fade-in { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: none; } }
    @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }

    /* === Panel system (JS toggles .active) === */
    .panel { flex: 1; display: none; overflow: hidden; }
    .panel.active { display: flex; }

    /* === Tab active state (JS toggles) === */
    .tab.active { color: #67e8f9; border-image: linear-gradient(90deg, #22d3ee, #38bdf8) 1; border-bottom-width: 2px; }
    .tab.active .tab-icon { color: #67e8f9; }

    /* === Status dots (JS toggles .on / .warn / .err) === */
    .dot { width: 7px; height: 7px; border-radius: 50%; background: #334155; transition: all 0.3s; }
    .dot.on { background: #22c55e; box-shadow: 0 0 8px rgba(34,197,94,0.6); }
    .dot.warn { background: #f59e0b; animation: pulse-glow 1.2s infinite; }
    .dot.err { background: #ef4444; box-shadow: 0 0 6px rgba(239,68,68,0.4); }

    /* === Ops toolbar (JS toggles .visible) === */
    .tabs {
      height: 36px; /* Exactly matched to macOS traffic light vertical offset */
      background: linear-gradient(180deg, rgba(7, 14, 25, 0.9), rgba(7, 14, 25, 0.72));
      border-bottom-color: var(--line-soft);
      backdrop-filter: blur(10px);
      --wails-draggable: drag;
      padding-left: 78px;
    }
    .tabs * { --wails-draggable: no-drag; }
    .tab { padding-top: 0; padding-bottom: 0; height: 100%; } /* Fill tab height */
    .ops-toolbar { position: absolute; top: 50%; transform: translateY(-50%); right: 10px; display: flex; gap: 6px; z-index: 11; opacity: 0; transition: opacity 0.25s; pointer-events: none; }
    #panel-ops:hover .ops-toolbar.visible { opacity: 1; pointer-events: auto; }

    /* === CCTV Grid columns (JS toggles .grid-2/3/4) === */
    .cctv-grid { flex: 1; display: grid; gap: 6px; padding: 6px; background: rgba(2, 6, 12, 0.88); overflow-y: auto; align-content: start; }
    .cctv-grid.grid-2 { grid-template-columns: repeat(2, 1fr); }
    .cctv-grid.grid-3 { grid-template-columns: repeat(3, 1fr); }
    .cctv-grid.grid-4 { grid-template-columns: repeat(4, 1fr); }

    /* === CCTV Cell === */
    .cctv-cell {
      position: relative; background: #071021; border: 1px solid var(--line-soft);
      border-radius: 6px; overflow: hidden; cursor: grab;
      transition: transform 0.45s cubic-bezier(0.4,0,0.2,1), opacity 0.45s cubic-bezier(0.4,0,0.2,1), border-color 0.25s, box-shadow 0.25s;
      content-visibility: auto;
    }
    .cctv-cell:hover { border-color: rgba(34, 211, 238, 0.35); box-shadow: 0 0 22px rgba(14, 165, 233, 0.17); }
    .cctv-cell:active { cursor: grabbing; }
    .cctv-cell img, .cctv-cell video { width: 100%; height: 100%; object-fit: cover; background: #000; display: block; }
    .cctv-cell .ch-label {
      position: absolute; bottom: 0; left: 0; right: 0;
      background: linear-gradient(transparent, rgba(0,0,0,0.85));
      padding: 16px 10px 5px; font-size: 11px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .cctv-cell .ch-name { border: none; background: transparent; font-size: 11px; color: #d1d5db; width: 100%; outline: none; cursor: text; font-family: inherit; }
    .cctv-cell .ch-name:focus { background: rgba(255,255,255,0.08); border-radius: 3px; padding: 1px 5px; }
    .cctv-cell .ch-id { color: #6b7280; font-size: 10px; margin-left: 6px; white-space: nowrap; font-family: ui-monospace, monospace; }
    .cctv-cell .ch-res { color: #4b5563; font-size: 9px; margin-left: 4px; }
    .cctv-cell.cell-shrink { transform: scale(0.3); opacity: 0; pointer-events: none; }

    /* === Sortable states === */
    .sortable-ghost { opacity: 0.25; border-color: #22d3ee; box-shadow: 0 0 24px rgba(14, 165, 233, 0.35); }
    .sortable-chosen { border-color: #67e8f9; box-shadow: 0 4px 24px rgba(0,0,0,0.5); }
    .sortable-drag { opacity: 0.9; transform: scale(1.03); border-color: #22d3ee; box-shadow: 0 8px 32px rgba(14, 165, 233, 0.45); }
    .sortable-fallback { opacity: 0.85; transform: scale(1.05); border-color: #67e8f9; box-shadow: 0 12px 40px rgba(14, 165, 233, 0.5); }

    /* === Expand overlay === */
    .cctv-expand-overlay {
      position: absolute; z-index: 20; background: #000; display: none;
      align-items: center; justify-content: center; cursor: pointer; overflow: hidden; border-radius: 6px;
      transition: left 0.45s cubic-bezier(0.4,0,0.2,1), top 0.45s cubic-bezier(0.4,0,0.2,1),
                  width 0.45s cubic-bezier(0.4,0,0.2,1), height 0.45s cubic-bezier(0.4,0,0.2,1),
                  border-radius 0.45s cubic-bezier(0.4,0,0.2,1);
    }
    .cctv-expand-overlay.active { left: 0!important; top: 0!important; width: 100%!important; height: 100%!important; border-radius: 0; }
    .cctv-expand-overlay img, .cctv-expand-overlay video { width: 100%; height: 100%; object-fit: contain; }
    .cctv-expand-overlay .expand-label {
      position: absolute; bottom: 0; left: 0; right: 0;
      background: linear-gradient(transparent, rgba(0,0,0,0.9)); padding: 20px 16px 10px;
      font-size: 13px; color: #d1d5db; display: flex; align-items: center; justify-content: space-between;
    }
    .cctv-expand-overlay .expand-hint { color: #6b7280; font-size: 11px; }

    /* === Mixed view === */
    .mixed-split { display: flex; flex: 1; overflow: hidden; }
    .mixed-left { display: flex; flex-direction: column; overflow: hidden; min-width: 200px; flex-shrink: 0; flex-grow: 0; }
    .mixed-divider { width: 4px; background: #1f2f49; cursor: col-resize; flex-shrink: 0; transition: all 0.2s; }
    .mixed-divider:hover, .mixed-divider.dragging { background: linear-gradient(180deg, #22d3ee, #0284c7); box-shadow: 0 0 8px rgba(14, 165, 233, 0.35); }
    .mixed-right { flex: 1; display: flex; position: relative; overflow: hidden; min-width: 200px; background: #000; }
    .mixed-right .canvas-wrap { flex: 1; display: flex; align-items: center; justify-content: center; }
    .mixed-right canvas { width: 100%; height: 100%; object-fit: contain; }
    .mixed-cctv-grid, .cctv-grid { position: relative; }
    .mixed-cctv-grid { flex: 1; display: grid; gap: 2px; padding: 2px; background: #000; overflow-y: auto; align-content: center; width: 100%; }
    .mixed-cctv-grid.cols-3 { grid-template-columns: repeat(3, 1fr); }
    .mixed-cctv-grid.cols-4 { grid-template-columns: repeat(4, 1fr); }
    .mixed-cctv-grid .cctv-cell { cursor: default; }
    .mixed-cctv-grid .cctv-cell img,
    .mixed-cctv-grid .cctv-cell video { object-fit: contain; }

    /* Vertical layout */
    .mixed-split.vertical { flex-direction: column; }
    .mixed-split.vertical .mixed-left { min-width: unset; min-height: 120px; flex-basis: 40%; }
    .mixed-split.vertical .mixed-divider { width: auto; height: 4px; cursor: row-resize; }
    .mixed-split.vertical .mixed-right { min-width: unset; min-height: 120px; }

    /* Layout toggle bar */
    .mixed-layout-bar { display: flex; align-items: center; gap: 6px; padding: 3px 10px; background: rgba(10,20,34,0.6); border-bottom: 1px solid var(--line-soft); flex-shrink: 0; }
    .layout-toggle-btn {
      display: flex; align-items: center; gap: 4px; padding: 3px 10px; font-size: 10px;
      background: rgba(30,42,65,0.6); border: 1px solid var(--line-soft); border-radius: 5px;
      color: #94a3b8; cursor: pointer; transition: all 0.15s; font-family: inherit;
    }
    .layout-toggle-btn:hover { color: #e2e8f0; border-color: rgba(148,163,184,0.3); }
    .layout-toggle-btn.active { background: rgba(6,182,212,0.15); color: #22d3ee; border-color: rgba(6,182,212,0.3); }

    /* === Region select === */
    .region-toolbar { position: absolute; top: 8px; left: 8px; display: flex; gap: 4px; z-index: 12; opacity: 0; transition: opacity 0.2s; pointer-events: none; }
    .mixed-right:hover .region-toolbar { opacity: 1; pointer-events: auto; }
    .region-btn {
      background: rgba(14, 165, 233, 0.72); color: #fff; border: none; border-radius: 6px;
      padding: 5px 12px; font-size: 10px; cursor: pointer; backdrop-filter: blur(8px);
      transition: all 0.15s; font-family: inherit;
      display: inline-flex !important; flex-direction: row !important; justify-content: center; align-items: center; gap: 4px;
      white-space: nowrap; word-break: keep-all; line-height: 1;
    }
    .region-btn:hover { background: #0284c7; }
    .region-btn.active { background: #22c55e; }
    .region-btn svg { flex-shrink: 0; }
    .region-btn-label { white-space: nowrap; }
    .region-select-overlay { position: absolute; inset: 0; cursor: crosshair; z-index: 11; display: none; }
    .region-rect { position: absolute; border: 2px dashed #67e8f9; background: rgba(14, 165, 233, 0.15); pointer-events: none; }

    /* === Canvas wrap === */
    .canvas-wrap { flex: 1; display: flex; align-items: center; justify-content: center; background: #000; }
    canvas { width: 100%; height: 100%; object-fit: contain; }

    /* === No channels placeholder === */
    .grid-btn.active { background: rgba(6, 182, 212, 0.15) !important; color: #22d3ee !important; border-color: rgba(6, 182, 212, 0.3) !important; }
    .cctv-no-channels { grid-column: 1/-1; display: flex; align-items: center; justify-content: center; color: #4b5563; font-size: 14px; min-height: 200px; gap: 8px; }

    /* === Scrollbar === */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #294468; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #3b5e8c; }

    @media (max-width: 900px) {
      .tab { padding-left: 12px !important; padding-right: 12px !important; }
      .tab-status-area { gap: 8px !important; padding-right: 8px !important; }
      .dvr-form { padding: 8px 10px !important; }
      .cctv-grid { gap: 4px; padding: 4px; }
    }
  </style>
</head>
<body class="flex flex-col h-screen overflow-hidden">

  <!-- === Tab Bar === -->
  <div class="tabs flex items-center bg-surface-100/80 backdrop-blur-md border-b border-white/[0.04] flex-shrink-0">
    <div class="tab flex items-center gap-2 px-5 py-2.5 text-[13px] font-medium text-gray-500 cursor-pointer border-b-2 border-transparent transition-all duration-200 hover:text-gray-300 active" data-panel="ops" onclick="switchTab(this)">
      <i data-lucide="monitor" class="tab-icon w-3.5 h-3.5 text-gray-600 transition-colors"></i>
      <span data-i18n="ops">Ops</span>
    </div>
    <div class="tab flex items-center gap-2 px-5 py-2.5 text-[13px] font-medium text-gray-500 cursor-pointer border-b-2 border-transparent transition-all duration-200 hover:text-gray-300" data-panel="cctv" onclick="switchTab(this)">
      <i data-lucide="camera" class="tab-icon w-3.5 h-3.5 text-gray-600 transition-colors"></i>
      <span>CCTV</span>
    </div>
    <div class="tab flex items-center gap-2 px-5 py-2.5 text-[13px] font-medium text-gray-500 cursor-pointer border-b-2 border-transparent transition-all duration-200 hover:text-gray-300" data-panel="mixed" onclick="switchTab(this)">
      <i data-lucide="columns-2" class="tab-icon w-3.5 h-3.5 text-gray-600 transition-colors"></i>
      <span data-i18n="mixed">Mixed</span>
    </div>

    <button onclick="refreshCurrentTab()" data-i18n-title="refresh" title="Refresh"
      class="fullscreen-btn ml-2 w-7 h-7 flex items-center justify-center rounded-md border border-white/[0.06] text-gray-500 hover:text-gray-200 hover:bg-white/[0.05] hover:border-white/10 transition-all">
      <i data-lucide="refresh-cw" class="w-3.5 h-3.5"></i>
    </button>

    <div class="tab-status-area ml-auto flex items-center gap-3 pr-3 text-[11px]">
      <div class="tab-status flex items-center gap-1.5" id="opsStatus">
        <span class="dot" id="statusDot"></span>
        <span class="label text-gray-600">Ops</span>
        <span class="info text-gray-500 font-mono text-[10px]" id="stats"></span>
      </div>
      <div class="tab-status flex items-center gap-1.5" id="cctvStatus">
        <span class="dot" id="cctvDot"></span>
        <span class="label text-gray-600">CCTV</span>
        <span class="info text-gray-500 font-mono text-[10px]" id="cctvInfo"></span>
      </div>
      <button onclick="openSettings()" title="Settings"
        class="w-7 h-7 flex items-center justify-center rounded-md border border-white/[0.06] text-gray-500 hover:text-gray-200 hover:bg-white/[0.05] hover:border-white/10 transition-all">
        <i data-lucide="settings" class="w-3.5 h-3.5"></i>
      </button>
    </div>
  </div>

  <!-- === Settings Overlay === -->
  <div id="settingsOverlay" style="display:none" class="fixed inset-0 z-[200] flex items-center justify-center bg-black/60 backdrop-blur-sm">
    <div class="w-[400px] max-h-[80vh] bg-[#0f1219] border border-white/10 rounded-xl shadow-2xl overflow-hidden" onclick="event.stopPropagation()">
      <!-- Header -->
      <div class="flex items-center justify-between px-5 py-3.5 border-b border-white/[0.06]">
        <h3 class="text-[13px] font-semibold text-gray-200" id="settingsTitle" data-i18n="settings">Settings</h3>
        <button onclick="closeSettings()" class="text-gray-500 hover:text-gray-200 transition-colors">
          <i data-lucide="x" class="w-4 h-4"></i>
        </button>
      </div>
      <!-- Body -->
      <div class="p-5 space-y-5 overflow-y-auto max-h-[60vh]">
        <!-- Language -->
        <div>
          <label class="block text-[11px] font-medium text-gray-400 uppercase tracking-wider mb-2" id="langLabel" data-i18n="lang">Language</label>
          <select id="langSelect" onchange="changeLang(this.value)"
            class="w-full bg-[#1a1f2e] border border-white/[0.08] rounded-lg px-3 py-2 text-[13px] text-gray-200 focus:outline-none focus:border-cyan-500/50 transition-colors">
            <option value="en">English</option>
            <option value="ko">한국어</option>
            <option value="ja">日本語</option>
            <option value="pt">Português</option>
            <option value="es">Español</option>
          </select>
        </div>
        <!-- Update -->
        <div>
          <label class="block text-[11px] font-medium text-gray-400 uppercase tracking-wider mb-2" id="updateLabel" data-i18n="update">Update</label>
          <div id="settingsUpdateArea" class="bg-[#1a1f2e] border border-white/[0.08] rounded-lg p-3">
            <div id="settingsUpdateStatus" class="flex items-center gap-2 text-[12px] text-gray-400">
              <i data-lucide="check-circle" class="w-3.5 h-3.5 text-green-500"></i>
              <span id="settingsUpdateMsg">Up to date</span>
            </div>
            <div id="settingsUpdateAvailable" style="display:none" class="space-y-2">
              <div class="flex items-center gap-2 text-[12px] text-cyan-400">
                <i data-lucide="download" class="w-3.5 h-3.5"></i>
                <span id="settingsNewVer"></span>
              </div>
              <button id="settingsUpdateBtn" onclick="doUpdate()"
                class="w-full px-3 py-2 bg-cyan-600 hover:bg-cyan-500 text-white text-[12px] rounded-lg transition-colors font-medium">
                <span id="settingsUpdateBtnText" data-i18n="updateNow">Update Now</span>
              </button>
              <span id="settingsUpdateProgress" style="display:none" class="block text-[11px] text-cyan-400 text-center"></span>
            </div>
          </div>
        </div>
      </div>
      <!-- Footer -->
      <div class="px-5 py-3 border-t border-white/[0.06] text-center">
        <span class="text-[10px] text-gray-600 font-mono" id="settingsVersion"></span>
      </div>
    </div>
  </div>

  <!-- ============= PANELS ============= -->

  <!-- === Ops Panel === -->
  <div class="panel active" id="panel-ops" style="position:relative;">
    <!-- Toolbar (visible when playing) -->
    <div class="ops-toolbar" id="opsToolbar">
      <button class="ops-setup-btn edit flex items-center gap-1.5 px-3 py-1.5 text-[11px] rounded-md bg-cyan-600/60 hover:bg-cyan-600 text-white/90 border-none cursor-pointer transition-all backdrop-blur-sm font-medium" onclick="showOpsSetup()">
        <i data-lucide="settings" class="w-3 h-3"></i> <span data-i18n="setup">Settings</span>
      </button>
      <button class="ops-setup-btn disconnect flex items-center gap-1.5 px-3 py-1.5 text-[11px] rounded-md bg-red-600/70 hover:bg-red-600 text-white/90 border-none cursor-pointer transition-all backdrop-blur-sm font-medium" onclick="opsDisconnect()">
        <i data-lucide="unplug" class="w-3 h-3"></i> <span data-i18n="disconnect">Disconnect</span>
      </button>
    </div>

    <!-- Setup overlay -->
    <div class="ops-setup absolute inset-0 flex flex-col items-center justify-center bg-black/85 backdrop-blur-sm z-10" id="opsSetup">
      <div class="ops-form w-[400px] bg-surface-200/90 backdrop-blur-xl border border-white/[0.06] rounded-xl p-6 flex flex-col gap-3 shadow-2xl shadow-black/50">
        <h3 class="text-[15px] font-semibold text-gray-100 flex items-center gap-2 mb-1">
          <i data-lucide="monitor-play" class="w-4 h-4 text-cyan-400"></i>
          <span data-i18n="screenSource">Screen Source</span>
        </h3>

        <!-- Relay option -->
        <div class="ops-option-header text-[12px] font-semibold text-cyan-400 flex items-center gap-1.5">
          <i data-lucide="radio" class="w-3.5 h-3.5"></i> <span data-i18n="opsRelay">OpsView Relay</span>
        </div>
        <div class="flex flex-col gap-1">
          <label class="text-gray-500 text-[11px]">OpsView IP</label>
          <input type="text" id="relayIp" placeholder="127.0.0.1" value="127.0.0.1"
            class="w-full bg-surface-50/80 text-gray-200 border border-white/[0.06] rounded-lg px-3 py-2 text-[12px] focus:border-cyan-500/50 focus:ring-1 focus:ring-cyan-500/20 outline-none transition-all placeholder-gray-600">
        </div>
        <div class="flex flex-col gap-1">
          <label class="text-gray-500 text-[11px]">OpsView Port</label>
          <input type="number" id="relayPort" placeholder="8080" value="8080"
            class="w-full bg-surface-50/80 text-gray-200 border border-white/[0.06] rounded-lg px-3 py-2 text-[12px] focus:border-cyan-500/50 focus:ring-1 focus:ring-cyan-500/20 outline-none transition-all placeholder-gray-600">
        </div>
        <div class="flex flex-col gap-1">
          <label class="text-gray-500 text-[11px]" data-i18n="pinLabel">PIN Code</label>
          <input type="text" id="pin" data-i18n-placeholder="pinPlaceholder" placeholder="6-digit PIN (e.g. 482193)"
            class="w-full bg-surface-50/80 text-gray-200 border border-white/[0.06] rounded-lg px-3 py-2 text-[12px] focus:border-cyan-500/50 focus:ring-1 focus:ring-cyan-500/20 outline-none transition-all placeholder-gray-600">
        </div>
        <div class="btn-row flex gap-2 mt-1">
          <button onclick="opsConnect()"
            class="flex-1 flex items-center justify-center gap-2 px-4 py-2.5 bg-gradient-to-r from-cyan-600 to-sky-600 hover:from-cyan-500 hover:to-sky-500 text-white text-[12px] font-medium rounded-lg border-none cursor-pointer transition-all shadow-lg shadow-cyan-900/30">
            <i data-lucide="plug" class="w-3.5 h-3.5"></i> <span data-i18n="connectRelay">Connect Relay</span>
          </button>
        </div>
        <div class="status-msg text-[11px] text-center" id="opsRelayStatus"></div>

        <div class="divider text-center text-gray-600 text-[11px] my-1 border-t border-white/[0.04] pt-3" data-i18n="or">or</div>

        <!-- Stream option -->
        <div class="ops-option-header text-[12px] font-semibold text-sky-400 flex items-center gap-1.5">
          <i data-lucide="video" class="w-3.5 h-3.5"></i> <span data-i18n="directStream">Direct Stream</span>
        </div>
        <div class="flex flex-col gap-1">
          <label class="text-gray-500 text-[11px]">RTSP / M3U8 / Video URL</label>
          <input type="text" id="fallbackUrl" placeholder="http://... .m3u8 or rtsp://..."
            class="w-full bg-surface-50/80 text-gray-200 border border-white/[0.06] rounded-lg px-3 py-2 text-[12px] focus:border-sky-500/50 focus:ring-1 focus:ring-sky-500/20 outline-none transition-all placeholder-gray-600">
        </div>
        <div class="btn-row flex gap-2 mt-1">
          <button onclick="opsStreamPlay()"
            class="flex-1 flex items-center justify-center gap-2 px-4 py-2.5 bg-gradient-to-r from-sky-600 to-cyan-700 hover:from-sky-500 hover:to-cyan-600 text-white text-[12px] font-medium rounded-lg border-none cursor-pointer transition-all shadow-lg shadow-sky-900/30">
            <i data-lucide="play" class="w-3.5 h-3.5"></i> <span data-i18n="playStream">Play Stream</span>
          </button>
        </div>
        <div class="status-msg text-[11px] text-center" id="opsStreamStatus"></div>
      </div>
    </div>

    <!-- Canvas for relay -->
    <div class="canvas-wrap" id="opsCanvasWrap" style="display:none;">
      <canvas id="screen"></canvas>
    </div>
    <!-- Video for stream -->
    <div class="canvas-wrap" id="opsStreamWrap" style="display:none;">
      <video id="streamVideo" autoplay muted playsinline style="width:100%;height:100%;object-fit:contain;"></video>
    </div>
  </div>

  <!-- === CCTV Panel === -->

  <!-- === Scripts === -->
  <script src="https://cdn.jsdelivr.net/npm/fzstd@0.1.1/umd/index.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.17/dist/hls.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.6/Sortable.min.js"></script>
  <script src="viewer.js"></script>
  <script>
    // Initialize Lucide icons
    lucide.createIcons();

    // Tab switching (saves last tab)
    function switchTab(el) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
      el.classList.add('active');
      const panel = el.dataset.panel;
      document.getElementById('panel-' + panel).classList.add('active');
      localStorage.setItem('opsview_last_tab', panel);
    }

    function refreshCurrentTab() {
      window.location.reload();
    }

    document.addEventListener('keydown', e => {
      if (e.key === 'Escape' && expandedOverlay) {
        collapseCell();
      }
    });

    // Load saved config into form fields
    (function initOpsConfig() {
      const savedIp = localStorage.getItem('opsview_relay_ip');
      const savedPort = localStorage.getItem('opsview_relay_port');
      const savedPin = localStorage.getItem('opsview_pin');
      const savedFallback = localStorage.getItem('opsview_fallback_url');
      if (savedIp) document.getElementById('relayIp').value = savedIp;
      if (savedPort) document.getElementById('relayPort').value = savedPort;
      if (savedPin) document.getElementById('pin').value = savedPin;
      if (savedFallback) document.getElementById('fallbackUrl').value = savedFallback;
      // Wails backend config as fallback (only if no localStorage values)
      if (window.go && window.go.main && window.go.main.App) {
        window.go.main.App.GetConfig().then(cfg => {
          if (!savedIp && cfg.url) {
             try {
                // cfg.url was likely the full wss url. Extract ip/port.
                const urlObj = new URL(cfg.url);
                document.getElementById('relayIp').value = urlObj.hostname;
                document.getElementById('relayPort').value = urlObj.port || (urlObj.protocol === 'wss:' ? '443' : '80');
             } catch(e) {}
          }
          if (!savedPin && cfg.pin) document.getElementById('pin').value = cfg.pin;
        });
      }
    })();

    // Restore last tab + auto-start
    (function restoreLastTab() {
      const lastTab = localStorage.getItem('opsview_last_tab');
      if (lastTab && lastTab !== 'ops') {
        const tabEl = document.querySelector('.tab[data-panel="' + lastTab + '"]');
        if (tabEl) switchTab(tabEl);
      }
      // Auto-connect Ops if we have saved relay or stream URL
      const lastOpsMode = localStorage.getItem('opsview_ops_mode'); // 'relay' or 'stream'
      if (lastOpsMode === 'relay' && localStorage.getItem('opsview_relay_ip')) {
        setTimeout(() => opsConnect(), 500);
      } else if (lastOpsMode === 'stream' && localStorage.getItem('opsview_fallback_url')) {
        setTimeout(() => opsStreamPlay(), 500);
      }
    })();

    // === Ops Panel UI ===
    let hlsInstance = null;
    let streamMode = false; // true = playing direct stream

    function showOpsSetup() {
      // Stop everything and show setup
      opsDisconnect();
    }

    // Uses OVP_MAGIC, OVP_HEADER_SIZE, MSG_SURV_CONFIG, MSG_SURV_SNAPSHOT from viewer.js

    function sendOVPMsg(type, jsonStr) {
      if (!opsWs || opsWs.readyState !== WebSocket.OPEN) return;
      const payload = new TextEncoder().encode(jsonStr);
      const msg = new ArrayBuffer(OVP_HEADER_SIZE + payload.length);
      const view = new DataView(msg);
      view.setUint32(0, OVP_MAGIC, true);
      view.setUint16(4, 1, true);
      view.setUint16(6, type, true);
      view.setUint32(8, payload.length, true);
      new Uint8Array(msg, OVP_HEADER_SIZE).set(payload);
      opsWs.send(msg);
    }

    let opsWs = null;
    let opsConnected = false;
    let reconnectAttempts = 0;
    const MAX_RECONNECT_ATTEMPTS = 5;
    let reconnectTimeout = null;

    function setStatus(status, message) {
      const el = document.getElementById('opsRelayStatus');
      if (el) {
        el.textContent = message;
        switch (status) {
          case 'connecting': el.style.color = '#eab308'; break; // yellow
          case 'connected': el.style.color = '#22c55e'; break; // green
          case 'disconnected': el.style.color = '#ef4444'; break; // red
          case 'error': el.style.color = '#ef4444'; break; // red
          default: el.style.color = '#9ca3af'; // gray
        }
      }
      // Update the status dot in the top bar
      const dot = document.getElementById('statusDot');
      if (dot) {
        dot.className = 'dot';
        if (status === 'connected') dot.classList.add('on');
        else if (status === 'connecting') dot.classList.add('warn');
        else if (status === 'error' || status === 'disconnected') dot.classList.add('err');
      }
    }

    function connect() {
      const ip = document.getElementById('relayIp').value.trim();
      const port = document.getElementById('relayPort').value.trim();
      const pin = document.getElementById('pin').value.trim();

      if (!ip || !port) {
        setStatus('error', t('enterIpPort'));
        return;
      }

      const url = `ws://${ip}:${port}/watch`;
      setStatus('connecting', t('connecting'));

      if (opsWs) {
        opsWs.close();
      }

      opsWs = new WebSocket(url);

      opsWs.binaryType = 'arraybuffer';
      opsWs.onopen = () => {
        console.log('WebSocket Connected');
        opsConnected = true;
        // Bridge to viewer.js globals so frame rendering + stats work
        ws = opsWs;
        connected = true;
        reconnectAttempts = 0;
        clearTimeout(reconnectTimeout);
        setStatus('connected', t('connected'));
        // Send OVP HELLO + AUTH
        const hello = { role: 'watcher', client: 'opsview-web', client_version: '0.1.8', supports: ['zstd'], want_profile: null };
        sendOVPMsg(1, JSON.stringify(hello));
        const auth = { token: pin };
        sendOVPMsg(2, JSON.stringify(auth));
      };

      opsWs.onmessage = (event) => {
        if (!(event.data instanceof ArrayBuffer)) return;
        const buf = event.data;
        if (buf.byteLength < OVP_HEADER_SIZE) return;
        const view = new DataView(buf);
        const magic = view.getUint32(0, true);
        if (magic !== OVP_MAGIC) return;
        const msgType = view.getUint16(6, true);
        const payloadLen = view.getUint32(8, true);

        if (msgType === MSG_SURV_CONFIG) {
          const payload = new Uint8Array(buf, OVP_HEADER_SIZE, payloadLen);
          const text = new TextDecoder().decode(payload);
          try {
            window.survConfig = JSON.parse(text);
            document.dispatchEvent(new CustomEvent('surv-config-updated', { detail: window.survConfig }));
            console.log('[surv] config received:', window.survConfig.dvrs?.length, 'DVRs,', window.survConfig.channels?.length, 'channels');
          } catch (e) { console.error('[surv] config parse error:', e); }
        } else if (msgType === MSG_SURV_SNAPSHOT) {
          const payload = new Uint8Array(buf, OVP_HEADER_SIZE, payloadLen);
          const text = new TextDecoder().decode(payload);
          try {
            const resp = JSON.parse(text);
            const cb = window._survSnapshotCallbacks && window._survSnapshotCallbacks[resp.req_id];
            if (cb) {
              delete window._survSnapshotCallbacks[resp.req_id];
              cb(resp.error ? null : resp.data, resp.error || null);
            }
          } catch (e) { console.error('[surv] snapshot parse error:', e); }
        } else {
          // Forward all other messages (frames, errors, heartbeat) to viewer.js
          handleBinaryMessage(buf);
        }
      };

      opsWs.onclose = () => {
        console.log('WebSocket Disconnected');
        opsConnected = false;
        if (reconnectAttempts < MAX_RECONNECT_ATTEMPTS) {
          reconnectAttempts++;
          setStatus('disconnected', `${t('reconnecting')} (${reconnectAttempts}/${MAX_RECONNECT_ATTEMPTS})...`);
          reconnectTimeout = setTimeout(connect, 3000); // Try to reconnect after 3 seconds
        } else {
          setStatus('error', t('maxReconnect'));
        }
      };

      opsWs.onerror = (error) => {
        console.error('WebSocket Error:', error);
        setStatus('error', t('connError'));
        opsWs.close(); // Force close to trigger onclose and potential reconnect
      };
    }

    function disconnect() {
      if (opsWs) {
        opsWs.close();
        opsWs = null;
      }
      opsConnected = false;
      // Sync viewer.js globals
      ws = null;
      connected = false;
      reconnectAttempts = 0;
      clearTimeout(reconnectTimeout);
      setStatus('disconnected', t('disconnected'));
    }

    function opsConnect() {
      const ip = document.getElementById('relayIp').value.trim();
      const port = document.getElementById('relayPort').value.trim();
      const pin = document.getElementById('pin').value.trim();

      if (!ip || !port) {
        document.getElementById('opsRelayStatus').textContent = t('enterIpPort');
        document.getElementById('opsRelayStatus').style.color = '#ef4444';
        return;
      }
      localStorage.setItem('opsview_relay_ip', ip);
      localStorage.setItem('opsview_relay_port', port);
      localStorage.setItem('opsview_pin', pin);
      localStorage.setItem('opsview_ops_mode', 'relay');
      document.getElementById('opsRelayStatus').textContent = t('connecting');
      document.getElementById('opsRelayStatus').style.color = '#eab308';

      stopStream();
      document.getElementById('opsCanvasWrap').style.display = 'flex';
      document.getElementById('opsStreamWrap').style.display = 'none';
      streamMode = false;

      connect();

      let checks = 0;
      const checker = setInterval(() => {
        checks++;
        if (opsConnected) {
          clearInterval(checker);
          document.getElementById('opsRelayStatus').textContent = '';
          document.getElementById('opsSetup').style.display = 'none';
          document.getElementById('opsToolbar').classList.add('visible');
        } else if (checks > 30) {
          clearInterval(checker);
          document.getElementById('opsRelayStatus').textContent = t('connFailed');
          document.getElementById('opsRelayStatus').style.color = '#ef4444';
        }
      }, 200);
    }

    function opsDisconnect() {
      disconnect();
      stopStream();
      streamMode = false;
      localStorage.removeItem('opsview_ops_mode');
      document.getElementById('opsToolbar').classList.remove('visible');
      document.getElementById('opsSetup').style.display = 'flex';
      document.getElementById('opsCanvasWrap').style.display = 'none';
      document.getElementById('opsStreamWrap').style.display = 'none';
    }

    const SP = () => window.go && window.go.main && window.go.main.StreamProxy;

    async function opsStreamPlay() {
      const url = document.getElementById('fallbackUrl').value.trim();
      if (!url) {
        document.getElementById('opsStreamStatus').textContent = t('enterStreamUrl');
        document.getElementById('opsStreamStatus').style.color = '#ef4444';
        return;
      }
      localStorage.setItem('opsview_fallback_url', url);
      localStorage.setItem('opsview_ops_mode', 'stream');
      document.getElementById('opsStreamStatus').textContent = t('loading');
      document.getElementById('opsStreamStatus').style.color = '#eab308';

      if (opsConnected) disconnect();
      stopStream();

      const video = document.getElementById('streamVideo');
      document.getElementById('opsCanvasWrap').style.display = 'none';
      document.getElementById('opsStreamWrap').style.display = 'flex';
      streamMode = true;

      function onPlaying() {
        document.getElementById('opsStreamStatus').textContent = '';
        document.getElementById('opsSetup').style.display = 'none';
        document.getElementById('opsToolbar').classList.add('visible');
      }
      function onError(msg) {
        document.getElementById('opsStreamStatus').textContent = msg;
        document.getElementById('opsStreamStatus').style.color = '#ef4444';
      }

      // RTSP: use Go backend ffmpeg proxy → HLS
      if (url.startsWith('rtsp://')) {
        if (!SP()) { onError(t('streamProxyUnavailable')); return; }
        try {
          document.getElementById('opsStreamStatus').textContent = t('rtspConverting');
          const hlsUrl = await SP().StartStream(url);
          document.getElementById('opsStreamStatus').textContent = t('hlsWaiting');
          await new Promise(r => setTimeout(r, 2000));
          playHLS(hlsUrl, video, onPlaying, onError);
        } catch(e) {
          onError(t('rtspError') + ': ' + e);
        }
        return;
      }

      // M3U8: play directly via HLS.js
      if (url.includes('.m3u8')) {
        playHLS(url, video, onPlaying, onError);
        return;
      }

      // Direct video URL (mp4, etc)
      video.src = url;
      video.onloadeddata = () => onPlaying();
      video.onerror = () => onError(t('streamLoadFail'));
      video.play().catch(() => {});
    }

    function playHLS(url, video, onPlaying, onError) {
      if (typeof Hls !== 'undefined' && Hls.isSupported()) {
        hlsInstance = new Hls({
          enableWorker: true,
          lowLatencyMode: true,
          manifestLoadingMaxRetry: 10,
          manifestLoadingRetryDelay: 1000,
          levelLoadingMaxRetry: 6,
          levelLoadingRetryDelay: 1000,
        });
        hlsInstance.loadSource(url);
        hlsInstance.attachMedia(video);
        hlsInstance.on(Hls.Events.MANIFEST_PARSED, () => { video.play(); onPlaying(); });
        hlsInstance.on(Hls.Events.ERROR, (e, data) => { if (data.fatal) onError(t('hlsError') + ': ' + data.type); });
      } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
        video.src = url;
        video.addEventListener('loadedmetadata', () => { video.play(); onPlaying(); });
        video.onerror = () => onError(t('hlsLoadFail'));
      } else {
        onError(t('hlsNotSupported'));
      }
    }

    function stopStream() {
      if (hlsInstance) { hlsInstance.destroy(); hlsInstance = null; }
      const video = document.getElementById('streamVideo');
      if (video) { video.pause(); video.removeAttribute('src'); video.load(); }
      // Stop ffmpeg backend
      if (SP()) { SP().StopStream().catch(() => {}); }
    }

    // === CCTV Multi-DVR ===
    const CM = () => window.go && window.go.main && window.go.main.CCTVManager;
    let dvrs = [];
    let activeDvrId = null;
    let cctvChannels = [];
    let cctvTimers = [];
    let cctvRenderedDvrId = null;
    let mixedRenderedDvrId = null;
    // Shared map of active WebRTC streams: key "dvrID_chNum" → { pc, stream }
    let channelStreams = {};
    let channelConnecting = new Set();
    let channelPeerConns = [];
    let mixedPeerConns = [];
    const MIXED_MISSING_RETRY_MS = [3500, 9000];
    let mixedRetryTimers = [];

    function cleanupChannelPCs() {
      channelPeerConns.forEach(pc => { try { pc.close(); } catch(e) {} });
      channelPeerConns = [];
    }
    function cleanupMixedPCs() {
      mixedPeerConns.forEach(pc => { try { pc.close(); } catch(e) {} });
      mixedPeerConns = [];
    }
    function cleanupAllStreams() {
      cleanupChannelPCs();
      cleanupMixedPCs();
      channelStreams = {};
      channelConnecting = new Set();
    }
    function clearMixedRetryTimers() {
      mixedRetryTimers.forEach(t => clearTimeout(t));
      mixedRetryTimers = [];
    }

    const MAX_RETRIES = 6;
    const ICE_GATHER_TIMEOUT_MS = 900;

    function getConcurrentLimit(channelCount) {
      if (channelCount >= 16) return 2;
      if (channelCount >= 9) return 3;
      return 4;
    }

    async function waitForIceCandidates(pc, timeoutMs = ICE_GATHER_TIMEOUT_MS) {
      if (pc.iceGatheringState === 'complete') return;
      const hasLocalCandidate = () =>
        !!(pc.localDescription && pc.localDescription.sdp && pc.localDescription.sdp.includes('a=candidate:'));
      if (hasLocalCandidate()) return;

      await new Promise((resolve) => {
        const done = () => {
          clearTimeout(timer);
          pc.removeEventListener('icecandidate', onIce);
          pc.removeEventListener('icegatheringstatechange', onState);
          resolve();
        };
        const onIce = () => {
          if (hasLocalCandidate()) done();
        };
        const onState = () => {
          if (pc.iceGatheringState === 'complete') done();
        };
        const timer = setTimeout(done, timeoutMs);
        pc.addEventListener('icecandidate', onIce);
        pc.addEventListener('icegatheringstatechange', onState);
      });
    }

    async function startRTSPChannel(dvrID, chNum, video, instanceArr) {
      const key = dvrID + '_' + chNum;
      const cell = video.parentElement;

      // Reuse existing stream if already alive.
      if (channelStreams[key] && channelStreams[key].stream) {
        const tracks = channelStreams[key].stream.getTracks();
        const alive = tracks.length > 0 && tracks.every(t => t.readyState === 'live');
        if (alive) {
          video.srcObject = channelStreams[key].stream;
          video.play().catch(() => {});
          const staleStatus = cell.querySelector('.ch-status');
          if (staleStatus) staleStatus.remove();
          return;
        }
      }

      // Another panel is connecting this channel right now.
      if (channelConnecting.has(key)) {
        let waitStatus = cell.querySelector('.ch-status');
        if (!waitStatus) {
          waitStatus = document.createElement('div');
          waitStatus.className = 'ch-status';
          waitStatus.style.cssText = 'position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:#94a3b8;font-size:11px;text-align:center;padding:8px;pointer-events:none;z-index:1;';
          cell.appendChild(waitStatus);
        }
        waitStatus.textContent = 'CH' + chNum + ' ' + t('chConnWait');
        return;
      }

      channelConnecting.add(key);
      try {
        let retries = 0;

        // Stale stream, clean up
        if (channelStreams[key] && channelStreams[key].pc) {
          try { channelStreams[key].pc.close(); } catch(e) {}
          delete channelStreams[key];
        }

        let statusEl = cell.querySelector('.ch-status');
        if (!statusEl) {
          statusEl = document.createElement('div');
          statusEl.className = 'ch-status';
          statusEl.style.cssText = 'position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:#888;font-size:11px;text-align:center;padding:8px;pointer-events:none;z-index:1;';
          cell.appendChild(statusEl);
        }

        async function attempt() {
          if (!CM()) return;
          statusEl.style.color = '#888';
          statusEl.textContent = 'CH' + chNum + ' ' + t('chConnecting') + (retries > 0 ? ' (' + t('retry') + ' ' + retries + '/' + MAX_RETRIES + ')' : '');

          // Clean up previous PC for this channel
          if (channelStreams[key] && channelStreams[key].pc) {
            try { channelStreams[key].pc.close(); } catch(e) {}
            delete channelStreams[key];
          }

          try {
            console.log('[cctv] ch' + chNum + ': attempt ' + (retries + 1));
            const pc = new RTCPeerConnection({
              iceServers: [],
              bundlePolicy: 'max-bundle'
            });
            pc.addTransceiver('video', { direction: 'recvonly' });

            pc.ontrack = e => {
              console.log('[cctv] ch' + chNum + ': ontrack fired');
              const stream = e.streams && e.streams[0] ? e.streams[0] : new MediaStream([e.track]);
              channelStreams[key] = { pc: pc, stream: stream };
              video.srcObject = stream;
              video.style.display = '';
              video.play().catch(() => {});
              if (statusEl && statusEl.parentElement) statusEl.remove();
            };

            // Auto-retry on WebRTC connection failure
            pc.onconnectionstatechange = () => {
              console.log('[cctv] ch' + chNum + ': state=' + pc.connectionState);
              if (pc.connectionState === 'failed') {
                retries++;
                if (retries < MAX_RETRIES) {
                  console.log('[cctv] ch' + chNum + ': WebRTC failed, retrying ' + retries + '/' + MAX_RETRIES);
                  // Re-add status element if removed
                  if (!cell.querySelector('.ch-status')) {
                    statusEl = document.createElement('div');
                    statusEl.className = 'ch-status';
                    statusEl.style.cssText = 'position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:#eab308;font-size:11px;text-align:center;padding:8px;pointer-events:none;z-index:1;';
                    cell.appendChild(statusEl);
                  }
                  setTimeout(() => attempt(), 2000);
                } else {
                  console.log('[cctv] ch' + chNum + ': all retries exhausted, switching to snapshot');
                  switchToSnapshot(dvrID, chNum, cell);
                }
              }
            };

            const offer = await pc.createOffer();
            await pc.setLocalDescription(offer);
            await waitForIceCandidates(pc);
            const localDesc = pc.localDescription;
            if (!localDesc || !localDesc.sdp) {
              throw new Error(t('webrtcFail'));
            }

            const result = await CM().StartChannelStream(dvrID, chNum, localDesc.sdp);
            console.log('[cctv] ch' + chNum + ': WebRTC answer received');
            await pc.setRemoteDescription({ type: 'answer', sdp: result.sdp });
            instanceArr.push(pc);
            video._pc = pc;
          } catch(e) {
            const errMsg = (e && e.message) ? e.message : String(e);
            console.error('[cctv] ch' + chNum + ' attempt failed:', errMsg);
            retries++;
            if (retries < MAX_RETRIES) {
              statusEl.style.color = '#eab308';
              statusEl.textContent = 'CH' + chNum + ' ' + t('retry') + ' ' + retries + '/' + MAX_RETRIES;
              await new Promise(r => setTimeout(r, 2000));
              return attempt();
            } else {
              console.log('[cctv] ch' + chNum + ': all retries exhausted, switching to snapshot');
              switchToSnapshot(dvrID, chNum, cell);
            }
          }
        }

        await attempt();
      } finally {
        channelConnecting.delete(key);
      }
    }

    // Switch a failed WebRTC channel to ISAPI-style snapshot polling
    function switchToSnapshot(dvrID, chNum, cell) {
      // Remove video and status
      const video = cell.querySelector('video');
      if (video) video.remove();
      const status = cell.querySelector('.ch-status');
      if (status) status.remove();

      // Add img element
      const img = document.createElement('img');
      img.alt = 'CH' + chNum;
      img.src = '/cctv/snapshot/' + dvrID + '/' + chNum + '?t=' + Date.now();
      img.onerror = function() { this.style.opacity = '0.3'; };
      img.onload = function() { this.style.opacity = '1'; };
      cell.insertBefore(img, cell.firstChild);

      // Snapshot polling at 2s intervals
      const timer = setInterval(() => {
        const preload = new Image();
        preload.onload = () => { img.src = preload.src; img.style.opacity = '1'; };
        preload.src = '/cctv/snapshot/' + dvrID + '/' + chNum + '?t=' + Date.now();
      }, 2000);
      const timerPool = cell.closest('#mixedCctvGrid') ? mixedCctvTimers : cctvTimers;
      timerPool.push(timer);
      console.log('[cctv] ch' + chNum + ': switched to snapshot polling');
    }

    // Concurrent channel connections with adaptive limit by channel count.
    async function startRTSPChannelsStaggered(dvrID, channels, getVideo, instanceArr) {
      const queue = channels.slice();

      function next() {
        if (queue.length === 0) return;
        const ch = queue.shift();
        const video = getVideo(ch.ch_num);
        if (!video || !CM()) { next(); return; }
        startRTSPChannel(dvrID, ch.ch_num, video, instanceArr).finally(() => next());
      }

      const concurrency = Math.min(getConcurrentLimit(queue.length), queue.length);
      for (let i = 0; i < concurrency; i++) {
        next();
      }
    }

      const en = cctvChannels.filter(c => c.enabled).length;

    async function selectDVR(id) {
      // Stop previous RTSP streams when switching DVRs
      if (activeDvrId && activeDvrId !== id) {
        const prevDvr = dvrs.find(d => d.id === activeDvrId);
        if (prevDvr && prevDvr.protocol === 'rtsp' && CM()) {
          cleanupAllStreams();
          CM().StopDVRStreams(activeDvrId).catch(() => {});
        }
      }
      activeDvrId = id;
      renderDVRTabs();
      hideDVRForm();
      if (!CM()) return;
      try {
        cctvChannels = await CM().ListChannels(id) || [];
        if (cctvChannels.length === 0) {
          setDVRStatus(t('scanning'), '#eab308');
          cctvChannels = await CM().DiscoverChannels(id) || [];
          setDVRStatus(cctvChannels.length + t('nChannels'), '#22c55e');
        }
        const dvr = dvrs.find(d => d.id === id);
        const activePanel = document.querySelector('.panel.active');
        if (activePanel && activePanel.id === 'panel-mixed') {
          cctvRenderedDvrId = null;
          renderMixedCCTV();
        } else if (activePanel && activePanel.id === 'panel-cctv') {
          mixedRenderedDvrId = null;
          renderCCTVGrid(dvr);
        } else {
          cctvRenderedDvrId = null;
          mixedRenderedDvrId = null;
        }
        updateCCTVStatus();
      } catch(e) {
        setDVRStatus('Error: ' + e, '#ef4444');
      }
    }

    async function saveDVR() {
      if (!CM()) return;
      const name = document.getElementById('dvrName').value.trim();
      const addr = document.getElementById('dvrAddr').value.trim();
      const port = parseInt(document.getElementById('dvrPort').value) || 80;
      const user = document.getElementById('dvrUser').value.trim();
      const pass = document.getElementById('dvrPass').value;
      const protocol = document.getElementById('dvrProtocol').value;
      const quality = document.getElementById('dvrQuality').value;
      const refresh = parseInt(document.getElementById('dvrRefresh').value) || 2000;

      if (!addr) { setDVRStatus(t('enterDvrAddr'), '#ef4444'); return; }
      setDVRStatus(t('saving'), '#eab308');

      try {
        if (editingDvrId) {
          // Update existing DVR
          await CM().UpdateDVR(editingDvrId, name || addr, addr, port, user, pass, refresh, quality, protocol);
          const d = dvrs.find(v => v.id === editingDvrId);
          if (d) {
            d.name = name || addr; d.addr = addr; d.port = port;
            d.username = user; d.password = pass;
            d.refresh_rate = refresh; d.stream_quality = quality;
            d.protocol = protocol;
          }
          setDVRStatus(t('updateDone'), '#22c55e');
          hideDVRForm();
          renderDVRTabs();
          selectDVR(editingDvrId);
        } else {
          // Add new DVR
          const dvr = await CM().AddDVR(name || addr, addr, port, user, pass, protocol);
          await CM().UpdateDVR(dvr.id, dvr.name, addr, port, user, pass, refresh, quality, protocol);
          dvr.refresh_rate = refresh;
          dvr.stream_quality = quality;
          dvr.protocol = protocol;
          dvrs.push(dvr);
          hideDVRForm();
          selectDVR(dvr.id);
        }
      } catch(e) {
        setDVRStatus('Error: ' + e, '#ef4444');
      }
    }

    // --- Cell expand on double-click (motion tween) ---
    let expandedOverlay = null;
    let expandedSourceCell = null;
    let expandedTimer = null;
    let expandedVideoOriginalParent = null;

    function expandCell(chNum, chName, grid, cellEl) {
      collapseCell(true); // instant collapse if already expanded

      // Shrink all other cells
      grid.querySelectorAll('.cctv-cell').forEach(c => {
        if (c !== cellEl) c.classList.add('cell-shrink');
      });

      // Create/reuse overlay
      let overlay = grid.querySelector('.cctv-expand-overlay');
      if (!overlay) {
        overlay = document.createElement('div');
        overlay.className = 'cctv-expand-overlay';
        overlay.addEventListener('dblclick', () => collapseCell());
        grid.appendChild(overlay);
      }

      // Position overlay exactly at the cell's current position
      const gridRect = grid.getBoundingClientRect();
      const cellRect = cellEl.getBoundingClientRect();
      overlay.style.transition = 'none';
      overlay.style.left = (cellRect.left - gridRect.left) + 'px';
      overlay.style.top = (cellRect.top - gridRect.top + grid.scrollTop) + 'px';
      overlay.style.width = cellRect.width + 'px';
      overlay.style.height = cellRect.height + 'px';
      overlay.style.display = 'flex';
      overlay.classList.remove('active');

      const isRTSP = !!cellEl.querySelector('video');

      if (isRTSP) {
        // Move live video to overlay (keeps HLS connection alive)
        const video = cellEl.querySelector('video');
        expandedVideoOriginalParent = cellEl;
        overlay.innerHTML = '';
        overlay.appendChild(video);
        const label = document.createElement('div');
        label.className = 'expand-label';
        label.innerHTML = '<span class="expand-name">' + chName + ' (CH' + chNum + ')</span><span class="expand-hint">' + t('expandHint') + '</span>';
        overlay.appendChild(label);
      } else {
        // ISAPI: snapshot image with refresh
        expandedVideoOriginalParent = null;
        overlay.innerHTML = '<img><div class="expand-label"><span class="expand-name"></span><span class="expand-hint">' + t('expandHint') + '</span></div>';
        const img = overlay.querySelector('img');
        img.src = '/cctv/snapshot/' + activeDvrId + '/' + chNum + '?upscale=2&ai=1&t=' + Date.now();
        overlay.querySelector('.expand-name').textContent = chName + ' (CH' + chNum + ')';

        const dvr = dvrs.find(d => d.id === activeDvrId);
        const refreshMs = (dvr && dvr.refresh_rate) ? dvr.refresh_rate : 2000;
        if (expandedTimer) clearInterval(expandedTimer);
        expandedTimer = setInterval(() => {
          const preload = new Image();
          preload.onload = () => { img.src = preload.src; };
          preload.src = '/cctv/snapshot/' + activeDvrId + '/' + chNum + '?upscale=2&ai=1&t=' + Date.now();
        }, refreshMs);
      }

      // Animate to full grid on next frame
      requestAnimationFrame(() => {
        overlay.style.transition = '';
        overlay.classList.add('active');
      });

      expandedOverlay = overlay;
      expandedSourceCell = cellEl;
    }

    function collapseCell(instant) {
      if (expandedTimer) { clearInterval(expandedTimer); expandedTimer = null; }
      if (!expandedOverlay) return;

      const overlay = expandedOverlay;
      const cellEl = expandedSourceCell;
      const grid = overlay.parentElement;

      // Un-shrink other cells
      grid.querySelectorAll('.cctv-cell.cell-shrink').forEach(c => {
        c.classList.remove('cell-shrink');
      });

      // Move video back to original cell if RTSP
      if (expandedVideoOriginalParent) {
        const video = overlay.querySelector('video');
        if (video && expandedVideoOriginalParent.isConnected) {
          const label = expandedVideoOriginalParent.querySelector('.ch-label');
          expandedVideoOriginalParent.insertBefore(video, label);
        }
        expandedVideoOriginalParent = null;
      }

      if (instant || !cellEl) {
        overlay.style.display = 'none';
        overlay.classList.remove('active');
        expandedOverlay = null;
        expandedSourceCell = null;
        return;
      }

      // Animate back to cell position
      const gridRect = grid.getBoundingClientRect();
      const cellRect = cellEl.getBoundingClientRect();
      overlay.classList.remove('active');
      overlay.style.left = (cellRect.left - gridRect.left) + 'px';
      overlay.style.top = (cellRect.top - gridRect.top + grid.scrollTop) + 'px';
      overlay.style.width = cellRect.width + 'px';
      overlay.style.height = cellRect.height + 'px';

      // Hide after animation completes
      setTimeout(() => {
        overlay.style.display = 'none';
      }, 480);

      expandedOverlay = null;
      expandedSourceCell = null;
    }

    // --- Grid rendering with SortableJS + preload (no flicker) ---
    let sortableInstance = null;

    function renderCCTVGrid(dvr) {
      const grid = document.getElementById('cctvGrid');
      cctvRenderedDvrId = dvr ? dvr.id : null;
      cctvTimers.forEach(t => clearInterval(t));
      cctvTimers = [];
      collapseCell(true);
      cleanupAllStreams();
      if (sortableInstance) { sortableInstance.destroy(); sortableInstance = null; }

      const enabled = cctvChannels.filter(ch => ch.enabled);
      enabled.sort((a, b) => a.order - b.order);

      if (enabled.length === 0) {

    function applyMixedOrder() {
      const split = document.getElementById('mixedSplit');

      const right = document.getElementById('mixedRight');
      // Default: CCTV first, Canvas second

      // Vertical default: Canvas first (top), CCTV second (bottom)
      // Vertical swapped: CCTV first (top), Canvas second (bottom)
      const isVert = mixedLayout === 'vertical';
      const cctvFirst = isVert ? mixedSwapped : !mixedSwapped;
      if (cctvFirst) {
        split.insertBefore(left, split.firstChild);
        split.insertBefore(divider, right);
      } else {
        split.insertBefore(right, split.firstChild);

      document.addEventListener('mousemove', e => {
        if (!dragging) return;
        const rect = split.getBoundingClientRect();
        // Check if mixedLeft is the first child (before divider)
        const leftIsFirst = left === split.firstElementChild;
        let pct;
        if (mixedLayout === 'vertical') {
          const rawPct = ((e.clientY - rect.top) / rect.height) * 100;
          pct = leftIsFirst ? rawPct : (100 - rawPct);
          const clamped = Math.max(15, Math.min(85, pct));
          left.style.flexBasis = clamped + '%';
          localStorage.setItem('opsview_mixed_split_v', clamped);
        } else {
          const rawPct = ((e.clientX - rect.left) / rect.width) * 100;
          pct = leftIsFirst ? rawPct : (100 - rawPct);
          const clamped = Math.max(15, Math.min(85, pct));
          left.style.flexBasis = clamped + '%';
          localStorage.setItem('opsview_mixed_split', clamped);

        const stream = video.srcObject;
        const hasLiveTrack = !!(stream && stream.getTracks().some(t => t.readyState === 'live'));
        const hasStatus = !!video.parentElement.querySelector('.ch-status');
        return !hasLiveTrack && !hasStatus;

          startRTSPChannelsStaggered(dvrID, missing,

        }, delay);
        mixedRetryTimers.push(t);

        grid.classList.remove('cols-3', 'cols-4');

          // Connections started via staggered function after grid is built
        } else {

          img.alt = ch.name;
          img.src = '/cctv/snapshot/' + activeDvrId + '/' + ch.ch_num + '?t=' + Date.now();
          img.onerror = function() { this.style.opacity = '0.3'; };
          img.onload = function() { this.style.opacity = '1'; };
          cell.appendChild(img);

          const timer = setInterval(() => {
            const preload = new Image();
            preload.onload = () => {
              img.src = preload.src;
              img.style.opacity = '1';
            };
            preload.src = '/cctv/snapshot/' + activeDvrId + '/' + ch.ch_num + '?t=' + Date.now();
          }, refreshMs);

        const label = document.createElement('div');

    // Mixed Ops canvas (mirrors the main canvas region)

    (function initMixedOps() {
      mixedCanvas = document.getElementById('mixedScreen');
      mixedCtx = mixedCanvas.getContext('2d');

      // Mirror Ops source (canvas or video) to mixed canvas every frame
      function mirrorLoop() {
        // Pick source: stream video if active, otherwise relay canvas
        let src = null;
        const video = document.getElementById('streamVideo');
        const canvas = document.getElementById('screen');

        if (streamMode && video && video.readyState >= 2 && video.videoWidth > 0) {
          src = video;
          var srcW = video.videoWidth, srcH = video.videoHeight;
        } else if (canvas && canvas.width > 0 && canvas.height > 0) {
          src = canvas;
          var srcW = canvas.width, srcH = canvas.height;
        }

        if (src) {
          if (cropRegion) {
            mixedCanvas.width = cropRegion.w;
            mixedCanvas.height = cropRegion.h;
            mixedCtx.drawImage(src, cropRegion.x, cropRegion.y, cropRegion.w, cropRegion.h, 0, 0, cropRegion.w, cropRegion.h);
          } else {
            if (mixedCanvas.width !== srcW || mixedCanvas.height !== srcH) {
              mixedCanvas.width = srcW;
              mixedCanvas.height = srcH;
            }
            mixedCtx.drawImage(src, 0, 0);
          }
        }
        requestAnimationFrame(mirrorLoop);
      }
      mirrorLoop();
    })();

    (function initRegionSelect() {
      const overlay = document.getElementById('regionOverlay');
      const rect = document.getElementById('regionRect');
      let startX, startY, isDragging = false;

      overlay.addEventListener('mousedown', e => {
        const bounds = overlay.getBoundingClientRect();
        startX = e.clientX - bounds.left;
        startY = e.clientY - bounds.top;
        isDragging = true;
        rect.style.left = startX + 'px';
        rect.style.top = startY + 'px';
        rect.style.width = '0';
        rect.style.height = '0';
        rect.style.display = 'block';
      });

      overlay.addEventListener('mousemove', e => {
        if (!isDragging) return;
        const bounds = overlay.getBoundingClientRect();
        const curX = e.clientX - bounds.left;
        const curY = e.clientY - bounds.top;
        const x = Math.min(startX, curX);
        const y = Math.min(startY, curY);
        const w = Math.abs(curX - startX);
        const h = Math.abs(curY - startY);
        rect.style.left = x + 'px';
        rect.style.top = y + 'px';
        rect.style.width = w + 'px';
        rect.style.height = h + 'px';
      });

      overlay.addEventListener('mouseup', e => {
        if (!isDragging) return;
        isDragging = false;

        const bounds = overlay.getBoundingClientRect();
        const curX = e.clientX - bounds.left;
        const curY = e.clientY - bounds.top;

        const selX = Math.min(startX, curX);
        const selY = Math.min(startY, curY);
        const selW = Math.abs(curX - startX);
        const selH = Math.abs(curY - startY);

        if (selW > 10 && selH > 10) {
          // Get source dimensions (video or canvas)
          const video = document.getElementById('streamVideo');
          const canvas = document.getElementById('screen');
          let srcW, srcH;
          if (streamMode && video && video.videoWidth > 0) {
            srcW = video.videoWidth;
            srcH = video.videoHeight;
          } else if (canvas && canvas.width > 0) {
            srcW = canvas.width;
            srcH = canvas.height;
          } else {
            srcW = bounds.width;
            srcH = bounds.height;
          }

          // Account for object-fit:contain letterboxing
          const containerW = bounds.width;
          const containerH = bounds.height;
          const srcRatio = srcW / srcH;
          const containerRatio = containerW / containerH;
          let renderW, renderH, offsetX, offsetY;
          if (srcRatio > containerRatio) {
            // Source wider → pillarboxed top/bottom
            renderW = containerW;
            renderH = containerW / srcRatio;
            offsetX = 0;
            offsetY = (containerH - renderH) / 2;
          } else {
            // Source taller → letterboxed left/right
            renderH = containerH;
            renderW = containerH * srcRatio;
            offsetX = (containerW - renderW) / 2;
            offsetY = 0;
          }

          // Map selection coords to source coords
          const scale = srcW / renderW;
          cropRegion = {
            x: Math.max(0, Math.round((selX - offsetX) * scale)),
            y: Math.max(0, Math.round((selY - offsetY) * scale)),
            w: Math.min(srcW, Math.round(selW * scale)),
            h: Math.min(srcH, Math.round(selH * scale))
          };
          // Clamp to source bounds
          cropRegion.x = Math.min(cropRegion.x, srcW - cropRegion.w);
          cropRegion.y = Math.min(cropRegion.y, srcH - cropRegion.h);
          if (cropRegion.x < 0) cropRegion.x = 0;
          if (cropRegion.y < 0) cropRegion.y = 0;

          localStorage.setItem('opsview_crop_region', JSON.stringify(cropRegion));
          document.getElementById('regionResetBtn').style.display = 'inline-block';
        }

        rect.style.display = 'none';
        toggleRegionSelect(); // Exit select mode
      });

      // Restore saved crop region
      const saved = localStorage.getItem('opsview_crop_region');
      if (saved) {

    let currentLang = localStorage.getItem('opsview_lang') || navigator.language.slice(0,2) || 'en';
    if (!i18n[currentLang]) currentLang = 'en';

    function t(key) {
      return (i18n[currentLang] && i18n[currentLang][key]) || i18n['en'][key] || key;
    }

    function applyI18n() {
      // Auto-apply data-i18n attributes
      document.querySelectorAll('[data-i18n]').forEach(el => {
        el.textContent = t(el.dataset.i18n);
      });
      document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
        el.placeholder = t(el.dataset.i18nPlaceholder);
      });
      document.querySelectorAll('[data-i18n-title]').forEach(el => {
        el.title = t(el.dataset.i18nTitle);
      });
      // Dynamic elements
      if (!pendingUpdate) {
        document.getElementById('settingsUpdateMsg').textContent = t('upToDate');
      }
    }

    function changeLang(lang) {
      currentLang = lang;
      localStorage.setItem('opsview_lang', lang);
      applyI18n();
    }

    // ── Settings overlay ──
    function openSettings() {
      const overlay = document.getElementById('settingsOverlay');
      document.getElementById('langSelect').value = currentLang;
      if (pendingUpdate) {
        document.getElementById('settingsUpdateStatus').style.display = 'none';
        document.getElementById('settingsUpdateAvailable').style.display = 'block';
      }
      const verEl = document.getElementById('settingsVersion');
      if (pendingUpdate) verEl.textContent = 'v' + pendingUpdate.current_ver;
      overlay.style.display = 'flex';
      applyI18n();
      lucide.createIcons();
    }

    function closeSettings() {
      document.getElementById('settingsOverlay').style.display = 'none';
    }

    document.getElementById('settingsOverlay').addEventListener('click', (e) => {
      if (e.target.id === 'settingsOverlay') closeSettings();
    });

    // ── Update ──
    let pendingUpdate = null;

    async function checkUpdate() {
      if (!UPD()) return;
      try {
        const info = await UPD().CheckForUpdate();
        if (info && info.available) {
          pendingUpdate = info;
          const msg = t('newVersion').replace('{ver}', info.latest_ver).replace('{cur}', info.current_ver);
          document.getElementById('settingsNewVer').textContent = msg;
          document.getElementById('settingsUpdateStatus').style.display = 'none';
          document.getElementById('settingsUpdateAvailable').style.display = 'block';
          document.getElementById('settingsVersion').textContent = 'v' + info.current_ver;
        } else if (info) {
          document.getElementById('settingsVersion').textContent = 'v' + info.current_ver;
        }
      } catch(e) { console.log('update check:', e); }
    }

    async function doUpdate() {
      if (!pendingUpdate || !UPD()) return;
      const btn = document.getElementById('settingsUpdateBtn');
      const prog = document.getElementById('settingsUpdateProgress');
      btn.style.display = 'none';
      prog.style.display = 'block';
      prog.textContent = t('downloading');
      try {
        const msg = await UPD().DownloadAndInstall(pendingUpdate.download_url);
        prog.textContent = msg || t('done');
      } catch(e) {
        prog.textContent = t('error') + ': ' + e;
        prog.style.color = '#ef4444';
        btn.style.display = 'block';
      }
    }

    // Check for updates 3s after launch
    setTimeout(checkUpdate, 3000);

    // Apply i18n on load
    applyI18n();

    // Init CCTV
    loadDVRs();

    // Surveillance config from agent (via relay WebSocket)
    document.addEventListener('surv-config-updated', (e) => {
      const cfg = e.detail;
      if (!cfg) return;
      console.log('[surv] remote config:', cfg.dvrs?.length, 'DVRs,', cfg.channels?.length, 'channels');
      // Store for use by snapshot loading
      window.survRemoteConfig = cfg;
    });
  </script>
