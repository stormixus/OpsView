services:
  relay:
    build:
      context: .
      dockerfile: Dockerfile
      additional_contexts:
        - proto=../proto
    ports:
      - "${RELAY_EXTERNAL_PORT:-28186}:8080"
    environment:
      - RELAY_PORT=8080
      - RELAY_PUBLISHER_TOKEN=${RELAY_PUBLISHER_TOKEN:-}
      # RELAY_WATCHER_TOKENS is no longer needed; PIN covers all auth.
    restart: unless-stopped
